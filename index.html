function CalendarImportSection({state,setState,C,F,FS}){
 var [calStep,setCalStep]=React.useState(0);
 var [calImport,setCalImport]=React.useState(null);

 function parseCalendar(data,wb){
  if(!data||!data.length) return {groups:[],weeks:{},hours:{}};
  var row0=data[0];
  var groups=[];
  for(var c=1;c<row0.length;c++){
   var g=String(row0[c]||"").trim();
   if(g) groups.push(g);
  }
  var weeks={};
  var hours={};
  groups.forEach(function(g){weeks[g]=[];hours[g]={};});
  var ws=wb?wb.Sheets[wb.SheetNames[0]]:null;
  for(var r=1;r<data.length;r++){
   var wn=parseInt(data[r][0]);
   if(!wn||isNaN(wn)) continue;
   for(var ci=0;ci<groups.length;ci++){
    var raw=data[r][ci+1];
    var numVal=parseFloat(String(raw||"").trim());
    var present=!isNaN(numVal)&&numVal>0;
    if(!present&&ws){
     var XLSX=window.XLSX;
     if(XLSX){
      var cellAddr=XLSX.utils.encode_cell({r:r,c:ci+1});
      var cell=ws[cellAddr];
      if(cell&&cell.s&&cell.s.fgColor){
       var rgb=((cell.s.fgColor.rgb||cell.s.fgColor.argb)||"").toUpperCase();
       var isGrey=rgb.match(/^(FF)?(7F|80|A9|B2|BF|C0|C8|D3|D9)/)!==null;
       if(!isGrey&&rgb.length>0) present=true;
      }
     }
    }
    if(present){
     weeks[groups[ci]].push(wn);
     if(!isNaN(numVal)&&numVal>0) hours[groups[ci]][wn]=numVal;
    }
   }
  }
  return {groups,weeks,hours};
 }

 function handleFile(e){
  var file=e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
   try{
    if(!XLSX){alert("SheetJS non disponible");return;}
    var wb=XLSX.read(ev.target.result,{type:"array"});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    var parsed=parseCalendar(data,wb);
    var mapping={};
    parsed.groups.forEach(function(name){
     var found=state.groups.find(function(g){
      return g.name.toLowerCase().trim()===name.toLowerCase().trim();
     });
     mapping[name]=found?found.id:"";
    });
    setCalImport({parsed,mapping});
    setCalStep(1);
   }catch(err){alert("Erreur lecture: "+(err&&err.message));}
  };
  reader.readAsArrayBuffer(file);
 }

 function applyCalendar(){
  var mapping=calImport.mapping;
  var weeks=calImport.parsed.weeks;
  setState(function(p){
   var newGroups=p.groups.map(function(g){
    var fname=Object.keys(mapping).find(function(k){return mapping[k]===g.id;});
    if(!fname||!weeks[fname]) return g;
    return Object.assign({},g,{calendar:weeks[fname].map(function(wn){return {week:wn,present:true};})});
   });
   return Object.assign({},p,{groups:newGroups});
  });
  setCalStep(2);
 }

 if(calStep===2) return(
  <div style={{display:"flex",alignItems:"center",gap:8}}>
   <span style={{color:C.olive,fontSize:14}}>{"✅"}</span>
   <span style={{fontSize:12,fontWeight:600,color:C.olive}}>Calendrier applique avec succes</span>
   <button onClick={function(){setCalStep(0);setCalImport(null);}}
    style={{border:"1px solid "+C.bord,borderRadius:6,padding:"2px 8px",
    background:"#fff",cursor:"pointer",fontSize:10,fontFamily:F,color:C.mut}}>
    Recommencer
   </button>
  </div>
 );

 if(calStep===1&&calImport) return(
  <div>
   <div style={{fontSize:11,fontWeight:600,color:C.olive,marginBottom:8}}>
    {calImport.parsed.groups.length+" groupes detectes"}
   </div>
   {calImport.parsed.groups.map(function(name){
    var wks=calImport.parsed.weeks[name]||[];
    var hs=calImport.parsed.hours[name]||{};
    var avg=Object.values(hs).length?Math.round(Object.values(hs).reduce(function(s,v){return s+v;},0)/Object.values(hs).length*10)/10:0;
    return(
     <div key={name} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
      <span style={{fontSize:11,fontWeight:600,minWidth:130,color:C.txt}}>{name}</span>
      <span style={{fontSize:10,color:C.mut,minWidth:55}}>{wks.length+" sem."}</span>
      {avg>0&&<span style={{fontSize:10,color:C.dim,minWidth:60}}>{"~"+avg+"h/sem"}</span>}
      <select value={calImport.mapping[name]||""}
       onChange={function(e){
        var v=e.target.value;
        setCalImport(function(ci){return Object.assign({},ci,{mapping:Object.assign({},ci.mapping,{[name]:v})});});
       }}
       style={{border:"1px solid "+C.bord,borderRadius:6,padding:"3px 6px",fontFamily:F,fontSize:11,flex:1,minWidth:150}}>
       <option value="">-- Ne pas importer --</option>
       {state.groups.map(function(g){return <option key={g.id} value={g.id}>{g.name}</option>;})}
       );
      </select>
     </div>
    );
   })}
   <div style={{display:"flex",gap:8,marginTop:10}}>
    <button onClick={applyCalendar}
     style={{padding:"7px 18px",borderRadius:8,background:C.olive,color:"#fff",
     border:"none",cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:700}}>
     Appliquer le calendrier
    </button>
    <button onClick={function(){setCalStep(0);setCalImport(null);}}
     style={{padding:"7px 14px",borderRadius:8,background:"#fff",color:C.dim,
     border:"1px solid "+C.bord,cursor:"pointer",fontFamily:F,fontSize:12}}>
     Annuler
    </button>
   </div>
  </div>
 );

 return(
  <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer",
   padding:"8px 16px",borderRadius:8,border:"1px solid "+C.brun,
   background:"#fff",color:C.brun,fontFamily:F,fontSize:12,fontWeight:700}}>
   {"📂 Choisir un fichier .xlsx"}
   <input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
  </label>
 );
}

function generateIcal(teacher, state){
 // Convertit le numero de semaine ISO + jour + creneau en date
 function weekDayToDate(weekNum, dayIdx, slotStart){
  // Trouver l'annee depuis le calendrier du formateur ou l'annee active
  var activeYear=(state.activeYear||"2025-2026");
  var yr=parseInt(activeYear.split("-")[0]);
  // Calculer le lundi de la semaine ISO weekNum
  var jan4=new Date(yr,0,4); // 4 janvier est toujours en S1
  var jan4dow=jan4.getDay()||7; // 1=lundi...7=dim
  var monday=new Date(jan4);
  monday.setDate(jan4.getDate()-(jan4dow-1)+(weekNum-1)*7);
  var d=new Date(monday);
  d.setDate(monday.getDate()+dayIdx);
  // Appliquer l'heure du creneau
  var parts=(slotStart||"08:00").split(":");
  d.setHours(parseInt(parts[0]),parseInt(parts[1]||0),0,0);
  return d;
 }
 function toIcalDate(d){
  var pad=function(n){return String(n).padStart(2,"0");};
  return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+"T"+pad(d.getHours())+pad(d.getMinutes())+"00";
 }
 function uidFor(wn,di,si,tid){
  return "mfr-"+tid+"-w"+wn+"-d"+di+"-s"+si+"@mfrstgreg.fr";
 }
 function escIcal(s){var r=String(s||"");r=r.split(",").join("\\,");r=r.split(";").join("\\;");r=r.split("\n").join("\\n");return r;}

 var lines=["BEGIN:VCALENDAR","VERSION:2.0",
  "PRODID:-//MFR Saint-Gregoire//Planning//FR",
  "CALSCALE:GREGORIAN","METHOD:PUBLISH",
  "X-WR-CALNAME:Planning "+escIcal(teacher.name),
  "X-WR-TIMEZONE:Europe/Paris"];

 var schedules=state.schedules||{};
 var SLOTSBD=getSlotsFromState(state);

 Object.keys(schedules).forEach(function(wn){
  var sched=schedules[wn];
  if(!sched) return;
  Object.keys(sched).forEach(function(gid){
   var gs=sched[gid]||{};
   var group=(state.groups||[]).find(function(g){return g.id===gid;});
   var gname=group?group.name:gid;
   [0,1,2,3,4].forEach(function(di){
    var dayGs=gs[di]||{};
    var daySlots=SLOTSBD[di]||[];
    daySlots.forEach(function(sl){
     var cell=dayGs[sl.id];
     if(!cell||cell.isReserved||cell.isBreak) return;
     if(cell.teacherId!==teacher.id) return;
     var dtstart=weekDayToDate(parseInt(wn),di,sl.start);
     var dtend=new Date(dtstart);
     // Duree depuis sl.end ou +1h par defaut
     if(sl.end){
      var ep=sl.end.split(":");
      dtend.setHours(parseInt(ep[0]),parseInt(ep[1]||0),0,0);
     } else {
      dtend.setHours(dtend.getHours()+1);
     }
     var subject=cell.subject||"Cours";
     var summary=escIcal(subject+" - "+gname);
     var desc=escIcal("Semaine "+wn+" | Formateur: "+teacher.name+(cell.isTP?" | TP":""));
     lines.push("BEGIN:VEVENT");
     lines.push("UID:"+uidFor(wn,di,sl.id,teacher.id));
     lines.push("DTSTART;TZID=Europe/Paris:"+toIcalDate(dtstart));
     lines.push("DTEND;TZID=Europe/Paris:"+toIcalDate(dtend));
     lines.push("SUMMARY:"+summary);
     lines.push("DESCRIPTION:"+desc);
     lines.push("CATEGORIES:Cours");
     lines.push("END:VEVENT");
    });
   });
  });
 });

 // Indisponibilites
 var indispos=(state.indispos&&state.indispos[teacher.id])||{};
 Object.keys(indispos).forEach(function(wn){
  var weekInd=indispos[wn]||{};
  [0,1,2,3,4].forEach(function(di){
   var dayInd=weekInd[di]||{};
   var SLOTSBD2=getSlotsFromState(state);
   var daySlots=SLOTSBD2[di]||[];
   daySlots.forEach(function(sl){
    var ind=dayInd[sl.id];
    if(!ind||!ind.blocked) return;
    var dtstart=weekDayToDate(parseInt(wn),di,sl.start);
    var dtend=new Date(dtstart);
    if(sl.end){var ep=sl.end.split(":");dtend.setHours(parseInt(ep[0]),parseInt(ep[1]||0),0,0);}
    else dtend.setHours(dtend.getHours()+1);
    lines.push("BEGIN:VEVENT");
    lines.push("UID:indispo-"+teacher.id+"-w"+wn+"-d"+di+"-s"+sl.id+"@mfrstgreg.fr");
    lines.push("DTSTART;TZID=Europe/Paris:"+toIcalDate(dtstart));
    lines.push("DTEND;TZID=Europe/Paris:"+toIcalDate(dtend));
    lines.push("SUMMARY:"+escIcal("Indispo: "+(ind.motif||"Non disponible")));
    lines.push("CATEGORIES:Indisponibilite");
    lines.push("TRANSP:OPAQUE");
    lines.push("END:VEVENT");
   });
  });
 });

 lines.push("END:VCALENDAR");
 return lines.join("\r\n");
}

function MsGraphSyncPanel({state,C,F,FS}){
 // Config stockee dans localStorage (pas dans state - c'est une config par machine)
 var LS_GRAPH='mfr_graph_config';
 function loadCfg(){try{return JSON.parse(localStorage.getItem(LS_GRAPH)||'{}');}catch(e){return {};}}
 function saveCfg(c){try{localStorage.setItem(LS_GRAPH,JSON.stringify(c));}catch(e){}}

 var [cfg,setCfg]=React.useState(loadCfg);
 var [status,setStatus]=React.useState('idle'); // idle|auth|syncing|done|error
 var [log,setLog]=React.useState([]);
 var [selTeacher,setSelTeacher]=React.useState('');
 var [showSetup,setShowSetup]=React.useState(!cfg.clientId);
 var [form,setForm]=React.useState({clientId:cfg.clientId||'',tenantId:cfg.tenantId||'',calName:cfg.calName||'Planning MFR'});

 function addLog(msg,type){
  setLog(function(l){return l.concat([{msg,type:type||'info',t:new Date().toLocaleTimeString()}]).slice(-20);});
 }

 function saveConfig(){
  var c={clientId:form.clientId.trim(),tenantId:form.tenantId.trim(),calName:form.calName||'Planning MFR'};
  saveCfg(c);setCfg(c);setShowSetup(false);
  addLog('Configuration sauvegardee','ok');
 }

 // Authentification MSAL via popup (necessite HTTPS)
 async function getToken(){
  if(!cfg.clientId||!cfg.tenantId){setShowSetup(true);throw new Error('Config manquante');}
  if(!window.msal){throw new Error('MSAL.js non charge - verifiez la connexion internet');}
  var msalCfg={auth:{clientId:cfg.clientId,authority:'https://login.microsoftonline.com/'+cfg.tenantId,redirectUri:window.location.origin}};
  var app=new window.msal.PublicClientApplication(msalCfg);
  await app.initialize();
  var accounts=app.getAllAccounts();
  var req={scopes:['Calendars.ReadWrite','User.Read']};
  try{
   var res=accounts.length>0?await app.acquireTokenSilent(Object.assign({account:accounts[0]},req)):await app.acquireTokenPopup(req);
   return res.accessToken;
  }catch(e){
   var res2=await app.acquireTokenPopup(req);
   return res2.accessToken;
  }
 }

 // Convertir semaine+jour+slot en datetime ISO
 function slotToISO(wn,di,slotTime,yearStr){
  var yr=parseInt((yearStr||state.activeYear||'2025-2026').split('-')[0]);
  var jan4=new Date(yr,0,4);
  var jan4dow=jan4.getDay()||7;
  var monday=new Date(jan4);
  monday.setDate(jan4.getDate()-(jan4dow-1)+(wn-1)*7+di);
  var parts=(slotTime||'08:00').split(':');
  monday.setHours(parseInt(parts[0]),parseInt(parts[1]||0),0,0);
  return monday.toISOString();
 }

 // Construire la liste d'evenements pour un formateur
 function buildEvents(teacher){
  var events=[];
  var SLOTSBD=getSlotsFromState(state);
  var schedules=state.schedules||{};
  Object.keys(schedules).forEach(function(wn){
   var sched=schedules[wn];
   if(!sched) return;
   Object.keys(sched).forEach(function(gid){
    var gs=sched[gid]||{};
    var group=(state.groups||[]).find(function(g){return g.id===gid;});
    var gname=group?group.name:gid;
    [0,1,2,3,4].forEach(function(di){
     var DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
     var daySlots=SLOTSBD[di]||[];
     daySlots.forEach(function(sl){
      var cell=(gs[di]||{})[sl.id];
      if(!cell||cell.isReserved||cell.isBreak||cell.teacherId!==teacher.id) return;
      var subject=cell.subject||'Cours';
      var typeLabel=cell.isTP?' [TP]':cell.courseType==='MG'?' [MG]':'';
      var title=subject+typeLabel+' - '+gname+' ('+sl.label+')';
      var body='Semaine '+wn+' | '+DAYS[di]+' '+sl.label+'\nGroupe : '+gname+'\nFormateur : '+teacher.name+(cell.isTP?'\nType : Travaux pratiques':'');
      events.push({
       subject:title,
       body:{contentType:'text',content:body},
       start:{dateTime:slotToISO(parseInt(wn),di,sl.start),timeZone:'Europe/Paris'},
       end:{dateTime:slotToISO(parseInt(wn),di,sl.end||sl.start,null),timeZone:'Europe/Paris'},
       categories:['Planning MFR','Cours'],
       isReminderOn:false
      });
     });
    });
   });
  });

  // Indisponibilites
  var indispos=(state.indispos&&state.indispos[teacher.id])||{};
  Object.keys(indispos).forEach(function(wn){
   var weekInd=indispos[wn]||{};
   [0,1,2,3,4].forEach(function(di){
    var SLOTSBD2=getSlotsFromState(state);
    (SLOTSBD2[di]||[]).forEach(function(sl){
     var ind=(weekInd[di]||{})[sl.id];
     if(!ind||!ind.blocked) return;
     events.push({
      subject:'Indisponible - '+(ind.motif||'Non disponible'),
      body:{contentType:'text',content:'Indisponibilite saisie dans le planning MFR'},
      start:{dateTime:slotToISO(parseInt(wn),di,sl.start),timeZone:'Europe/Paris'},
      end:{dateTime:slotToISO(parseInt(wn),di,sl.end||sl.start),timeZone:'Europe/Paris'},
      categories:['Planning MFR','Indisponibilite'],
      showAs:'busy',isReminderOn:false
     });
    });
   });
  });

  return events;
 }

 // Trouver ou creer le calendrier MFR dans Outlook
 async function getOrCreateCalendar(token,calName){
  var headers={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
  var r=await fetch('https://graph.microsoft.com/v1.0/me/calendars',{headers});
  var data=await r.json();
  var cals=(data.value||[]);
  var found=cals.find(function(c){return c.name===calName;});
  if(found) return found.id;
  var r2=await fetch('https://graph.microsoft.com/v1.0/me/calendars',{
   method:'POST',headers,body:JSON.stringify({name:calName})
  });
  var cal=await r2.json();
  return cal.id;
 }

 // Supprimer tous les events MFR existants pour eviter les doublons
 async function clearMfrEvents(token,calId){
  var headers={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
  var url='https://graph.microsoft.com/v1.0/me/calendars/'+calId+'/events?$filter=categories/any(c:c eq \'Planning MFR\')&$select=id&$top=100';
  var r=await fetch(url,{headers});
  var data=await r.json();
  var events=data.value||[];
  addLog('Suppression de '+events.length+' evenements existants...','info');
  for(var i=0;i<events.length;i++){
   await fetch('https://graph.microsoft.com/v1.0/me/calendars/'+calId+'/events/'+events[i].id,{method:'DELETE',headers});
  }
 }

 // Sync principale pour un formateur
 async function syncTeacher(teacher){
  addLog('Connexion Microsoft pour '+teacher.name+'...','info');
  setStatus('auth');
  var token=await getToken();
  addLog('Authentifie. Preparation du calendrier...','ok');
  setStatus('syncing');
  var calId=await getOrCreateCalendar(token,cfg.calName||'Planning MFR');
  await clearMfrEvents(token,calId);
  var events=buildEvents(teacher);
  addLog(events.length+' evenements a synchroniser...','info');
  // Batch par 20
  var headers={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
  var ok=0;
  for(var i=0;i<events.length;i++){
   var r=await fetch('https://graph.microsoft.com/v1.0/me/calendars/'+calId+'/events',{

function DirectorSpace({state,setState,onLogout,saveStatus,apiStatus,apiIsConfigured}){

  // Si aucun groupe present cette semaine, trouver la premiere semaine presente
  var anyPresent=state.groups.some(function(g){
   return (g.calendar||[]).some(function(c){return c.week===w&&c.present;});
  });
  if(!anyPresent){
   var allWeeks=[];
   state.groups.forEach(function(g){
    (g.calendar||[]).forEach(function(c){if(c.present)allWeeks.push(c.week);});
   });
   allWeeks.sort(function(a,b){return (a<30?a+52:a)-(b<30?b+52:b);});
   if(allWeeks.length>0) return allWeeks[0];
  }
  return w;
 })());

 function pushUndo(schedSnapshot){
  setUndoStack(function(prev){
   var next=prev.slice(-10); // garder 10 etats max
   next.push(schedSnapshot);
   return next;
  });
 }

 function doUndo(){
  if(!undoStack.length) return;
  var prev=undoStack[undoStack.length-1];
  setUndoStack(function(s){return s.slice(0,-1);});
  setState(function(p){
   var sc2=Object.assign({},p.schedules||{});
   sc2[String(cw)]=prev;
   return Object.assign({},p,{schedules:sc2});
  });
 }
 const [schResult,setSchResult]=useState(null);

 const [bulkProgress,setBulkProgress]=useState(null);
 const [dangerModal,setDangerModal]=useState(null); // {action, label, code}

 function clearWeek(wn, groupId){
  if(state.lockedWeeks&&(state.lockedWeeks[wn]||state.lockedWeeks[String(wn)])){
   alert("Semaine S"+wn+" verrouillee.");
   return;
  }
  var wnStr=String(wn);
  setState(function(p){
   var ns=Object.assign({},p.schedules||{});
   var newBank=(p.bank||[]).filter(function(b){
    if(String(b.cw)!==wnStr) return true;
    if(groupId&&b.groupId!==groupId) return true;
    return false;
   });
   if(groupId){
    if(ns[wnStr]){
     var nw=Object.assign({},ns[wnStr]);
     delete nw[groupId];
     ns[wnStr]=nw;
    }
   } else {
    delete ns[wnStr];
   }
   return Object.assign({},p,{schedules:ns,schedule:null,bank:newBank});
  });
  setSchResult(null);
 }
 function lockWeek(wn){

 function unlockWeek(wn){

 function lockAllWeeks(){
  var allWeeks=[];
  state.groups.forEach(function(g){
   (g.calendar||[]).forEach(function(w){
    if(w.present&&!(state.lockedWeeks&&state.lockedWeeks[String(w.week)])&&
     (state.schedules&&(state.schedules[w.week]||state.schedules[String(w.week)])))
     if(allWeeks.indexOf(w.week)<0) allWeeks.push(w.week);
   });
  });
  setState(function(p){

  });

 function unlockAllWeeks(){

 }
 function isGroupLocked(wn, gid){
  var lw=state.lockedWeeks||{};
  return !!(lw[String(wn)]||lw[wn]||lw[String(wn)+":"+gid]);
 }

 function buildPfHints(wn, groupId){
  return buildPfHintsFrom(state, wn, groupId);
 }
 function buildPfHintsFrom(st, wn, groupId){
  const pfH={};
  const grps=groupId?st.groups.filter(g=>g.id===groupId):st.groups;
  grps.forEach(g=>{
   const sem=(st.planFormation&&st.planFormation[g.id]&&st.planFormation[g.id].semaines&&st.planFormation[g.id].semaines[wn]&&st.planFormation[g.id].semaines[wn].heures)||{};
   if(Object.keys(sem).length>0)pfH[g.id]=sem;
  });
  return pfH;
 }

 async function doGenerate(wn, groupId){
  var _lw=state.lockedWeeks||{};
  if(_lw[wn]||_lw[String(wn)]){
   alert("La semaine S"+wn+" est validee et verrouillee. Deverrouillez-la d'abord.");
   return;
  }
  if(groupId&&(_lw[String(wn)+":"+groupId])){
   alert("Le planning de ce groupe est verrouille pour S"+wn+". Deverrouillez-le d'abord.");
   return;
  }
  try{
   _cm={};_ci=0;
   // Avertissement jours feries
   var ferisWn=getFerisForWeek(state,wn);
   if(ferisWn.length>0){
    var fnames=ferisWn.map(function(f){return f.label;}).join(", ");
    if(!window.confirm("La semaine S"+wn+" contient "+ferisWn.length+" jour(s) ferie(s) : "+fnames+".\nVoulez-vous quand meme generer le planning normalement ?"))return;
   }
   const pfH=buildPfHints(wn, groupId||null);
   const res=genSchedule(state,wn,pfH,groupId||null);
   const ns={...(state.schedules||{}),[wn]:res.schedule};
   const real=computeRealisees(res.schedule,wn,state.groups,state.etab||DEFAULT_ETAB);
   const npf={...(state.planFormation||{})};
   state.groups.forEach(g=>{
    const ghr=real[g.id]||{};
    if(!Object.keys(ghr).length)return;
    npf[g.id]={...(npf[g.id]||{semaines:{}})};
    npf[g.id].semaines={...(npf[g.id].semaines||{})};
    npf[g.id].semaines[wn]={...(npf[g.id].semaines[wn]||{}),heuresRealisees:ghr};
   });
   const twh=res.teacherHoursThisWeek||{};
   setState(p=>{
    const ntwh=Object.assign({},p.teacherWeekHours||{});
    Object.keys(twh).forEach(function(tid){
     ntwh[tid]=Object.assign({},ntwh[tid]||{});
     ntwh[tid][wn]=twh[tid]||0;
    });
    const alerts=[];
    state.teachers.forEach(function(t){
     const h=twh[t.id]||0;
     if(h>23) alerts.push(t.name+" : "+h+"h (DEPASSE 23h !)");
     else if(h>20) alerts.push(t.name+" : "+h+"h (exceptionnel)");
    });
    if(alerts.length>0) setTimeout(function(){
     alert("Attention heures formateurs S"+wn+":\n"+alerts.join("\n"));
    },300);
    return Object.assign({},p,{schedule:res.schedule,schedules:ns,
     currentWeek:wn,planFormation:npf,teacherWeekHours:ntwh});
   });
   setCw(wn);
   setSchResult(res);
   if(tab!=="planning")setTab("planning");
  }catch(e){alert("Erreur generation: "+e.message);console.error(e);}
  finally{setAiStatus("");}
 }

 async function doGenerateYear(groupId){
  var g=state.groups.find(function(x){return x.id===groupId;});
  if(!g){alert("Groupe introuvable");return;}
  var weeks=(g.calendar||[]).filter(function(w){
   return w.present&&!(state.lockedWeeks&&(state.lockedWeeks[w.week]||state.lockedWeeks[String(w.week)]));
  }).map(function(w){return w.week;});
  weeks.sort(function(a,b){return (a<30?a+52:a)-(b<30?b+52:b);});
  if(!weeks.length){alert("Aucune semaine non verrouillee pour "+g.name);return;}
  // Generation directe sans confirmation
  setTab("planning"); setBulkProgress({done:0,total:weeks.length,label:"Demarrage..."});
  var cumState=state;
  for(var i=0;i<weeks.length;i++){
   var wn=weeks[i];
   setBulkProgress({done:i+1,total:weeks.length,label:"S"+wn+" - "+g.name});
   try{
    var pfH=buildPfHintsFrom(cumState,wn,groupId);
    var res=genSchedule(cumState,wn,pfH,groupId);
    var ns=Object.assign({},cumState.schedules||{});
    ns[String(wn)]=res.schedule;
    var real=computeRealisees(res.schedule,wn,cumState.groups,cumState.etab||DEFAULT_ETAB);
    var npf=JSON.parse(JSON.stringify(cumState.planFormation||{}));
    cumState.groups.forEach(function(gr){
     var ghr=real[gr.id]||{};
     if(!Object.keys(ghr).length)return;
     if(!npf[gr.id])npf[gr.id]={semaines:{}};
     if(!npf[gr.id].semaines[wn])npf[gr.id].semaines[wn]={};
     npf[gr.id].semaines[wn].heuresRealisees=ghr;
    });
    var ntwh=JSON.parse(JSON.stringify(cumState.teacherWeekHours||{}));
    Object.keys(res.teacherHoursThisWeek||{}).forEach(function(tid){
     if(!ntwh[tid])ntwh[tid]={};
     ntwh[tid][wn]=res.teacherHoursThisWeek[tid]||0;
    });
    cumState=Object.assign({},cumState,{schedules:ns,planFormation:npf,teacherWeekHours:ntwh});
   }catch(e){console.error("Erreur S"+wn,e);}
   await new Promise(function(r){setTimeout(r,10);});
  }
  setState(Object.assign({},cumState,{currentWeek:cw}));
  setBulkProgress(null);
  alert("Planning annuel de "+g.name+" genere ("+weeks.length+" semaines).");
 }

 async function doGenerateAll(){
  var allGroups=state.groups.filter(function(g){
   return (g.calendar||[]).some(function(w){return w.present;});
  });
  var totalWeeks=0;
  allGroups.forEach(function(g){
   totalWeeks+=(g.calendar||[]).filter(function(w){
    return w.present&&!(state.lockedWeeks&&(state.lockedWeeks[w.week]||state.lockedWeeks[String(w.week)]));

    return w.present&&!(cumState.lockedWeeks&&(cumState.lockedWeeks[w.week]||cumState.lockedWeeks[String(w.week)]));
   }).map(function(w){return w.week;});
   weeks.sort(function(a,b){return (a<30?a+52:a)-(b<30?b+52:b);});
   for(var wi=0;wi<weeks.length;wi++){
    var wn=weeks[wi];
    setBulkProgress({done:done,total:totalWeeks,label:"S"+wn+" - "+g.name});

     var pfH=buildPfHintsFrom(cumState,wn,null);

     var ns=Object.assign({},cumState.schedules||{});
     ns[String(wn)]=res.schedule;
     var real=computeRealisees(res.schedule,wn,cumState.groups,cumState.etab||DEFAULT_ETAB);
     var npf=JSON.parse(JSON.stringify(cumState.planFormation||{}));
     cumState.groups.forEach(function(gr){
      var ghr=real[gr.id]||{};
      if(!Object.keys(ghr).length)return;
      if(!npf[gr.id])npf[gr.id]={semaines:{}};
      if(!npf[gr.id].semaines[wn])npf[gr.id].semaines[wn]={};
      npf[gr.id].semaines[wn].heuresRealisees=ghr;
     });
     var ntwh=JSON.parse(JSON.stringify(cumState.teacherWeekHours||{}));
     Object.keys(res.teacherHoursThisWeek||{}).forEach(function(tid){
      if(!ntwh[tid])ntwh[tid]={};
      ntwh[tid][wn]=res.teacherHoursThisWeek[tid]||0;
     });
     cumState=Object.assign({},cumState,{schedules:ns,planFormation:npf,teacherWeekHours:ntwh});
    }catch(e){console.error("Erreur S"+wn+" "+g.name,e);}
    done++;
    await new Promise(function(r){setTimeout(r,5);});
   }

  setState(Object.assign({},cumState,{currentWeek:cw}));

  alert("Planning annuel complet genere !");

 {id:"matrix",l:"Repartition par classe",short:"Matrice"},
 {id:"equipe",l:"Gestion equipe",short:"Equipe"},
 {id:"etab",l:"Gestion etablissement",short:"Etab."},
 {id:"import",l:"Import / Export",short:"Import"},
];
 return(
  <div style={{minHeight:"100vh",background:C.bg,fontFamily:F}}>
   {/* Header */}
   <div style={{background:C.surf,borderBottom:"1px solid "+C.bord,padding:isMobile?"0 8px":"0 16px",display:"flex",alignItems:"center",gap:12}}>
    <div style={{fontFamily:FS,fontWeight:700,color:C.brun,fontSize:14,padding:"12px 0"}}>Planning MFR v{APP_VERSION}</div>
    <div style={{flex:1,display:"flex",gap:4,overflowX:"auto"}}>
     {TABS.map(t=>(
      <button key={t.id} onClick={()=>setTab(t.id)}
       style={{padding:"12px 14px",border:"none",borderBottom:"2px solid "+(tab===t.id?C.olive:"transparent"),
       background:"transparent",cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:tab===t.id?700:400,

     <span style={{fontSize:10,color:saveStatus==="saved"?C.olive:saveStatus==="saving"?C.ocre:C.red}}>
      {saveStatus==="saved"?"Sauvegarde":saveStatus==="saving"?"Sauvegarde...":"Erreur"}
     </span>
     <Btn v="ghost" sm onClick={saveJSON}>Export JSON</Btn>
     <button onClick={()=>setState(p=>Object.assign({},p,{useAI:p.useAI===false?true:false}))}
      style={{fontSize:10,padding:"3px 8px",borderRadius:6,border:"1px solid "+C.bord,
      background:state.useAI===false?C.creme:C.accD,cursor:"pointer",fontFamily:F,
      color:state.useAI===false?C.mut:C.olive,fontWeight:600}}>
      {state.useAI===false?"IA desactivee":"IA activee"}
     </button>
     <Btn v="ghost" sm onClick={onLogout}>Deconnexion</Btn>
    </div>
   </div>
   {/* Contenu */}
   <div style={{padding:16,maxWidth:1200,margin:"0 auto"}}>
    {tab==="plan"&&(
     <PlanFormationPanel state={state} setState={setState} currentTeacher={null}
      cw={cw} setCw={setCw} onGenerateWeek={(wn,gid)=>doGenerate(wn,gid)}/>
    )}
    {tab==="planning"&&(
     <div>
      {aiStatus&&(
       <div style={{background:C.accD,border:"1px solid "+C.olive,borderRadius:8,
        padding:"10px 16px",marginBottom:10,display:"flex",gap:10,alignItems:"center"}}>
        <div style={{width:16,height:16,border:"2px solid "+C.olive,borderRadius:"50%",
         borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}></div>

       </div>

       {state.groups.filter(function(g){return (g.calendar||[]).some(function(w){return w.week===cw&&w.present;});}).map(function(g){return(
        <button key={g.id} onClick={function(){setViewGroup(g.id);}}
         style={{padding:'4px 12px',borderRadius:8,cursor:'pointer',fontFamily:F,fontSize:11,
         border:'1px solid '+((state.lockedWeeks&&(state.lockedWeeks[String(cw)]||state.lockedWeeks[String(cw)+":"+g.id]))?C.olive:viewGroup===g.id?C.brun:C.bord),

      <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>

      {schResult&&schResult.conflicts&&schResult.conflicts.length>0&&(

        <div style={{fontWeight:700,color:C.red,fontSize:12,marginBottom:4}}>

        </div>
        {schResult.conflicts.slice(0,8).map((c,i)=>(
         <div key={i} style={{fontSize:11,color:C.dim}}>{c.group} - {c.subject}: {c.placed}h/{c.needed}h</div>
        ))}
       </div>
      )}
    )}
    {tab==="recap"&&<RecapPanel state={state} setState={setState}/>}
    {tab==="matrix"&&<MatrixEditor state={state} setState={setState}/>}
    {tab==="equipe"&&(
     <EquipePanel state={state} setState={setState}/>
    )}
    {tab==="etab"&&(
     <EtablissementPanel state={state} setState={setState}/>
    )}
    {tab==="import"&&(
     <div style={{maxWidth:500}}>
      <ST>Import / Export</ST>
      <Card style={{marginBottom:12}}>
       <div style={{fontWeight:700,color:C.txt,fontSize:13,marginBottom:8}}>Charger un fichier JSON</div>
       <div style={{fontSize:12,color:C.mut,marginBottom:12}}>Charge un planning existant (formateurs, groupes, matrice, horaires).</div>
       <Btn onClick={loadJSON}>Charger JSON</Btn>
      </Card>
      <Card>
       <div style={{fontWeight:700,color:C.txt,fontSize:13,marginBottom:8}}>Exporter</div>
       <div style={{fontSize:12,color:C.mut,marginBottom:12}}>Sauvegarde l etat complet en JSON.</div>
       <Btn v="outline" onClick={saveJSON}>Telecharger JSON</Btn>
      </Card>
      {/* Statut synchronisation OVH */}
      <Card style={{marginBottom:12}}>
       <div style={{fontWeight:700,color:C.txt,fontSize:13,marginBottom:8}}>Synchronisation OVH</div>
       {apiIsConfigured?(
        <div>
         <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span style={{width:10,height:10,borderRadius:"50%",display:"inline-block",
           background:apiStatus==="synced"?"#4ade80":apiStatus==="syncing"?"#fbbf24":apiStatus==="error"?"#f87171":"#94a3b8"}}/>
          <span style={{fontSize:12,fontWeight:600,color:C.txt}}>
           {apiStatus==="synced"?"Synchronise avec OVH":apiStatus==="syncing"?"Synchronisation...":apiStatus==="error"?"Erreur de synchronisation":"Non connecte"}
          </span>
         </div>
         <div style={{fontSize:11,color:C.mut,marginBottom:8}}>
          Les donnees sont automatiquement sauvegardees sur votre serveur OVH a chaque modification.
          Accessibles depuis n importe quel appareil.
         </div>
        </div>
       ):(
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:10}}>
         <div style={{fontSize:12,fontWeight:600,color:"#92400e",marginBottom:4}}>
          API OVH non configuree
         </div>
         <div style={{fontSize:11,color:"#78350f",lineHeight:1.6}}>
          Pour activer la synchronisation multi-appareils, deployez les fichiers PHP sur votre serveur OVH
          puis modifiez la variable <code style={{background:"#fef3c7",padding:"1px 4px",borderRadius:3}}>API_BASE</code> dans le code source.
         </div>
        </div>
       )}
      </Card>
      <Card style={{marginBottom:12}}>
       <div style={{fontWeight:700,color:C.txt,fontSize:13,marginBottom:4}}>Exporter les calendriers formateurs (.ics)</div>
       <div style={{fontSize:11,color:C.mut,marginBottom:10}}>Compatible Teams, Outlook, Apple Calendar, Google Calendar.</div>
       <IcalExportPanel state={state} C={C} F={F} FS={FS}/>
      </Card>
      <Card style={{marginBottom:12}}>
       <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
        <div style={{fontWeight:700,color:C.txt,fontSize:13}}>Synchronisation Microsoft Teams / Outlook</div>
        <span style={{fontSize:9,background:"#dbeafe",color:"#1d4ed8",borderRadius:4,padding:"2px 6px",fontWeight:700}}>HTTPS requis</span>
       </div>
       <div style={{fontSize:11,color:C.mut,marginBottom:10}}>
        Synchronise directement le planning dans Outlook / Teams via Microsoft Graph API.
        Necessite que l app soit hebergee sur un serveur HTTPS (OVH).
       </div>
       <MsGraphSyncPanel state={state} C={C} F={F} FS={FS}/>
      </Card>
      <Card style={{marginBottom:12}}>
       <div style={{fontWeight:700,color:C.txt,fontSize:13,marginBottom:4}}>Importer un calendrier depuis Excel</div>
       <div style={{fontSize:11,color:C.mut,marginBottom:10}}>
        Format : colonne A = n* semaine, colonnes suivantes = groupes (valeur = heures de cours, vide ou 0 = absent).
       </div>
       <CalendarImportSection state={state} setState={setState} C={C} F={F} FS={FS}/>
      </Card>
      <div style={{marginTop:16,border:"2px solid "+C.red,borderRadius:10,padding:14}}>
       <div style={{fontWeight:700,color:C.red,fontSize:13,marginBottom:4}}>Zone de danger</div>
       <div style={{fontSize:11,color:C.mut,marginBottom:12}}>
        Ces actions sont irreversibles. Une confirmation par code est requise.
       </div>
       <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={()=>askDanger(resetSchedules,"Supprimer tous les plannings generes (semaines et heures realisees).","VIDER PLANNINGS")}
         style={{padding:"7px 14px",borderRadius:8,border:"2px solid "+C.red,
         background:"#fff5f5",color:C.red,cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:700}}>
         Vider tous les plannings
        </button>
        <button onClick={()=>askDanger(resetPlanFormation,"Supprimer tout le plan de formation (heures prevues, TP, regroupements).","VIDER PLAN")}
         style={{padding:"7px 14px",borderRadius:8,border:"2px solid "+C.red,

        <button onClick={()=>askDanger(resetAll,"Supprimer TOUTES les donnees generees : plannings, plan de formation, heures, verrous, banque de cours.","TOUT REINITIALISER")}
         style={{padding:"7px 14px",borderRadius:8,border:"2px solid "+C.red,
         background:C.red,color:"#fff",cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:700}}>
         Tout reinitialiser

     </div>

  {/* Modale de confirmation securisee */}
   {dangerModal&&(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.6)",
     display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}

// -- TEACHER SPACE -------------------------------------------------------------
function IndispoPanel({teacher,state,setState,cw,setCw,myIndispo,toggleIndispo}){
 var SLOTS_BY_DAY=getSlotsFromState(state); var SLOTS_1H=SLOTS_BY_DAY[1]||SLOTS_BY_DAY[0];
 var semaines=[];
 state.groups.forEach(function(g){
  (g.calendar||[]).forEach(function(w){
   if(w.present&&!semaines.includes(w.week)) semaines.push(w.week);
  });
 });
 semaines.sort(function(a,b){return (a<30?a+52:a)-(b<30?b+52:b);});
 var wIndispo=(myIndispo[cw])||{};
 var myPres=(state.presenceDays&&state.presenceDays[teacher.id])||{};
 var myLocked=((state.lockedSlots&&state.lockedSlots[teacher.id]&&state.lockedSlots[teacher.id][cw])||{});
 const MOTIFS=["Formation","Reunion","Conges","Deplacement","Maladie","Autre"];
 const PRES_VALS=["absent","am","pm","full"];
 const PRES_LABELS={absent:"Absent",am:"Matin",pm:"Aprem",full:"Complet"};
 const PRES_BG={absent:C.creme,am:"#dbeafe",pm:"#fed7aa",full:C.accD};
 const PRES_TX={absent:C.mut,am:"#1d4ed8",pm:"#c2410c",full:C.olive};
 const [selMotif,setSelMotif]=useState("");
 const [editMotif,setEditMotif]=useState(null); // {di,si}
 const DAYS_S=["Lun","Mar","Mer","Jeu","Ven"];
 const [lockMode,setLockMode]=useState(false); // mode verrouillage creneau

 function togglePresence(di){
  setState(function(p){
   var pd=Object.assign({},p.presenceDays||{});
   var cur=(pd[teacher.id]&&pd[teacher.id][di])||"full";
   var idx=PRES_VALS.indexOf(cur);
   var next=PRES_VALS[(idx+1)%PRES_VALS.length];
   var presDay=Object.assign({},pd[teacher.id]||{});
   presDay[di]=next; pd[teacher.id]=presDay;
   var t2=p.teachers.map(function(t){
    return t.id===teacher.id?Object.assign({},t,{presenceDays:pd[teacher.id],presence:pd[teacher.id]}):t;
   });
   return Object.assign({},p,{presenceDays:pd,teachers:t2});
  });
 }

 function setIndispo(di,si,motif){
  setState(function(p){
   var ind=Object.assign({},p.indispos||{});
   var ti=Object.assign({},ind[teacher.id]||{});
   var wk=Object.assign({},ti[cw]||{});
   var dk=Object.assign({},wk[di]||{});
   if(dk[si]&&!motif) delete dk[si];
   else dk[si]={blocked:true,motif:motif||""};
   wk[di]=dk; ti[cw]=wk; ind[teacher.id]=ti;
   return Object.assign({},p,{indispos:ind});
  });
  setEditMotif(null);
 }

 function lockSlot(di,si,groupId,subject){
  if(!groupId||!subject) return;
  setState(function(p){
   var ls=Object.assign({},p.lockedSlots||{});
   var tls=Object.assign({},ls[teacher.id]||{});
   var wk=Object.assign({},tls[cw]||{});
   var dk=Object.assign({},wk[di]||{});
   if(dk[si]) delete dk[si];
   else dk[si]={subject,teacherId:teacher.id,groupId,locked:true};
   wk[di]=dk; tls[cw]=wk; ls[teacher.id]=tls;
   return Object.assign({},p,{lockedSlots:ls});
  });
 }

 // Planning actuel du formateur cette semaine
 var myCells=[];
 var sch=state.schedules&&(state.schedules[cw]||state.schedules[String(cw)]);
 if(sch){
  state.groups.forEach(function(g){
   var gs=sch[g.id]||{};
   DAYS.forEach(function(_,di){
    (SLOTS_BY_DAY[di]||SLOTS_1H).forEach(function(sl){
     var cell=gs[di]&&gs[di][sl.id];
     if(cell&&!cell.isReserved&&cell.teacherId===teacher.id){
      var locked=myLocked[di]&&myLocked[di][sl.id];
      myCells.push({di,si:sl.id,subject:cell.subject,group:g.name,groupId:g.id,locked:!!locked});
     }
    });
   });
  });
 }

 return(
  <div>
   <div style={{fontFamily:FS,fontSize:16,fontWeight:700,color:C.brun,marginBottom:12}}>Imperatifs et indisponibilites</div>

   {/* Presence demi-journee */}
   <div style={{background:C.card,border:"1px solid "+C.bord,borderRadius:10,padding:14,marginBottom:12}}>
    <div style={{fontWeight:700,fontSize:13,color:C.txt,marginBottom:8}}>Mes jours de presence</div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
     {DAYS.map(function(d,di){
      var p=(myPres[di])||"full";
      return(
       <div key={di} style={{textAlign:"center"}}>
        <div style={{fontSize:9,color:C.mut,marginBottom:2}}>{DAYS_S[di]}</div>
        <button onClick={function(){togglePresence(di);}}
         style={{padding:"6px 10px",borderRadius:7,border:"1px solid "+PRES_BG[p],
         background:PRES_BG[p],color:PRES_TX[p],fontFamily:F,fontSize:10,fontWeight:700,cursor:"pointer",minWidth:58}}>
         {PRES_LABELS[p]}
        </button>
       </div>
      );
     })}
    </div>
   </div>

   {/* Selecteur semaine */}
   <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
    <Sel value={String(cw)} onChange={function(e){setCw(parseInt(e.target.value));}}>
     {semaines.map(function(wn){return <option key={wn} value={String(wn)}>{getWeekLabel(wn)}</option>;})}
     );
    </Sel>
    <Btn v={lockMode?"primary":"ghost"} sm onClick={function(){setLockMode(function(m){return !m;});}}>
     {lockMode?"Mode verrou actif":"Verrouiller un cours"}
    </Btn>
    {lockMode&&<span style={{fontSize:11,color:C.brun}}>Cliquez sur un de vos cours pour le verrouiller</span>}
   </div>

   {/* Grille indisponibilites */}
   <div style={{overflowX:"auto",marginBottom:12}}>
    <table style={{borderCollapse:"collapse",fontFamily:F,fontSize:10}}>
     <thead><tr>
      <th style={{background:C.brun,color:"#fff",padding:"4px 8px",width:85,fontSize:9}}>Creneau</th>

function TeacherHoursPanel({teacher,state,C,F,FS}){
 var tid=teacher.id;
 var cap=getTeacherWeekCap(state,tid);
 var capEx=Math.round((cap/20)*23*10)/10;
 var prevH=getTeacherPrevHours(state,tid);
 var realH=getTeacherRealHours(state,tid);
 var annH=state.matrix.filter(function(m){return m.teacherId===tid&&!m.isMGReceiver;})
  .reduce(function(s,m){return s+(m.hoursAnnual||0);},0);

 var allWeeks=[];
 state.groups.forEach(function(g){
  (g.calendar||[]).forEach(function(w){
   if(w.present&&!allWeeks.includes(w.week)) allWeeks.push(w.week);
  });
 });
 allWeeks.sort(function(a,b){return (a<30?a+52:a)-(b<30?b+52:b);});

 var totalPrev=Object.values(prevH).reduce(function(s,h){return s+h;},0);
 var totalReal=Object.values(realH).reduce(function(s,h){return s+h;},0);

 return(
  <div style={{maxWidth:800,padding:"0 0 24px"}}>
   <div style={{fontFamily:FS,fontSize:16,fontWeight:700,color:C.brun,marginBottom:4}}>Mes heures</div>

   {/* Resume */}
   <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
    {[
     {label:"Cap hebdo",val:cap+"h",sub:"norme 20h, taux peda "+(teacher.txPeda!=null?teacher.txPeda:100)+"%",color:C.olive},
     {label:"Max exceptionnel",val:capEx+"h",sub:"jamais plus de 2 sem",color:"#f59e0b"},
     {label:"H. annuelles matrice",val:annH+"h",sub:"total modules",color:C.brun},
     {label:"Total prevu PF",val:totalPrev.toFixed(1)+"h",sub:totalReal>0?"Reel : "+totalReal+"h":"depuis plan de formation",color:C.dim},
    ].map(function(c,i){return(
     <div key={i} style={{background:C.card,border:"1px solid "+C.bord,borderRadius:10,
      padding:"12px 14px",textAlign:"center"}}>
      <div style={{fontSize:10,color:C.mut,marginBottom:4}}>{c.label}</div>
      <div style={{fontSize:20,fontWeight:700,color:c.color}}>{c.val}</div>
      <div style={{fontSize:9,color:C.mut}}>{c.sub}</div>
     </div>
    );})}
   </div>

   {/* Tableau semaine par semaine */}
   <div style={{overflowX:"auto"}}>
    <table style={{borderCollapse:"collapse",fontFamily:F,fontSize:11,width:"100%"}}>
     <thead>
      <tr>
       <th style={{background:C.brun,color:"#fff",padding:"5px 10px",textAlign:"left"}}>Semaine</th>
       <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",width:70}}>Prevu PF</th>
       <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",width:70}}>Reel</th>
       <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",width:70}}>Cap sem.</th>
       <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"left"}}>Statut</th>
      </tr>
     </thead>
     <tbody>
      {allWeeks.map(function(wn,wi){
       var h=prevH[wn]||0;
       var hR=realH[wn]||0;
       var display=hR>0?hR:h;
       var isReal=hR>0;
       var over=display>capEx;
       var warn=display>cap&&!over;
       var ok=display>0&&!warn&&!over;
       var bg=over?"#fee2e2":warn?"#fef3c7":ok?"#f0fdf4":"#fff";
       var statusColor=over?C.red:warn?"#d97706":ok?C.olive:C.mut;
       var prev1W=allWeeks[wi-1],prev2W=allWeeks[wi-2];
       var p1=(prevH[prev1W]||realH[prev1W]||0);
       var p2=(prevH[prev2W]||realH[prev2W]||0);
       var blocked=p1>cap&&p2>cap; // 2 semaines precedentes > cap -> BLOQUE
       var statusText=display===0?"Aucun cours prevu":
        blocked&&display>cap?"BLOQUE - cap applique":
        over?"DEPASSEMENT (>"+capEx+"h)":
        warn?"Exceptionnel (>"+cap+"h)":"Dans la norme";
       var consec=blocked&&display>cap;
       if(consec){bg="#fecaca";}
       if(blocked&&display<=cap){bg="#fef9c3";statusText="Cap normal applique (2 sem. consec.)";}
       return(
        <tr key={wn} style={{background:bg,borderBottom:"1px solid "+C.bord}}>
         <PDay style={{padding:"5px 10px",fontWeight:600}}>Semaine {wn}</PDay>
         <PDay style={{padding:"4px",textAlign:"center",color:h>0?C.brun:C.mut}}>
          {h>0?h+"h":"-"}
         </PDay>
         <PDay style={{padding:"4px",textAlign:"center",color:hR>0?C.olive:C.mut,fontWeight:hR>0?700:400}}>
          {hR>0?hR+"h":"-"}
         </PDay>
         <PDay style={{padding:"4px",textAlign:"center",color:C.dim}}>{cap}h</PDay>
         <PDay style={{padding:"4px 10px",fontSize:10,color:statusColor,fontWeight:warn||over?700:400}}>
          {statusText}
          {consec&&<span style={{marginLeft:4,fontSize:9,background:C.red,color:"#fff",borderRadius:4,padding:"1px 4px"}}>!</span>}
         </PDay>
        </tr>
       );
      })}
     </tbody>
    </table>
   </div>
   <div style={{marginTop:10,fontSize:10,color:C.mut}}>
    Prevu = heures saisies dans le plan de formation. Reel = heures du planning genere.
   </div>
 );
}


function TeacherSpace({teacher,state,setState,onLogout}){
 var isMobile=useIsMobile();

 const [cw,setCw]=useState((function(){
  var w=state.currentWeek||getCurrentWeek();
  // Si aucun groupe present cette semaine, trouver la premiere semaine presente
  var anyPresent=state.groups.some(function(g){
   return (g.calendar||[]).some(function(c){return c.week===w&&c.present;});
  });
  if(!anyPresent){
   var allWeeks=[];
   state.groups.forEach(function(g){
    (g.calendar||[]).forEach(function(c){if(c.present)allWeeks.push(c.week);});
   });
   allWeeks.sort(function(a,b){return (a<30?a+52:a)-(b<30?b+52:b);});
   if(allWeeks.length>0) return allWeeks[0];
  }
  return w;
 })());
 const [viewGroup,setViewGroup]=useState((state.groups[0]&&state.groups[0].id)||"");
 const [undoStack,setUndoStack]=useState([]);

 function pushUndo(schedSnapshot){
  setUndoStack(function(prev){
   var next=prev.slice(-10); // garder 10 etats max
   next.push(schedSnapshot);
   return next;
  });
 }

 function doUndo(){
  if(!undoStack.length) return;
  var prev=undoStack[undoStack.length-1];
  setUndoStack(function(s){return s.slice(0,-1);});
  setState(function(p){
   var sc2=Object.assign({},p.schedules||{});
   sc2[String(cw)]=prev;
   return Object.assign({},p,{schedules:sc2});
  });
 }
 const [pinForm,setPinForm]=useState({old:"",n1:"",n2:""});

 const myIndispo=(state.indispos&&state.indispos[teacher.id])||{};

 function savePin(){
  if(pinForm.old!==(teacher.pin||"0000")){setPinMsg("Ancien PIN incorrect");return;}
  if(!/^[0-9]{4}$/.test(pinForm.n1)){setPinMsg("PIN = 4 chiffres");return;}
  if(pinForm.n1!==pinForm.n2){setPinMsg("PINs differents");return;}
  setState(function(p){return Object.assign({},p,{teachers:p.teachers.map(function(t){return t.id===teacher.id?Object.assign({},t,{pin:pinForm.n1}):t;})});});
  setPinMsg("PIN modifie !");
  setTimeout(function(){setPinMsg("");setPinForm({old:"",n1:"",n2:""});},1500);
 }

   var dk=Object.assign({},wk[di]||{});
   if(dk[si]) delete dk[si]; else dk[si]=true;
   wk[di]=dk; ti[wn]=wk; ind[teacher.id]=ti;
   return Object.assign({},p,{indispos:ind});
  });
 }

function App(){
 const [state,setStateRaw]=useState(function(){
  var s=loadFromLS();
  if(window.buildSlotsFromState) window.buildSlotsFromState(s);
  return s;
 }());
 const [apiStatus,setApiStatus]=React.useState("local"); // "local"|"synced"|"syncing"|"error"
 const [apiLoaded,setApiLoaded]=React.useState(false);
 const setState=React.useCallback(function(updater){
  setStateRaw(function(prev){
   var next=typeof updater==="function"?updater(prev):updater;
   if(window.buildSlotsFromState) window.buildSlotsFromState(next);
   // Propager teachers+etab vers les annees archivees si changement
   if(window.syncSharedToAllYears&&next.otherYears&&Object.keys(next.otherYears).length>0){
    next=window.syncSharedToAllYears(next);
   }
   return next;
  });
 },[]);
 const [session,setSession]=useState(null);
 const [saveStatus,setSaveStatus]=useState("saved");
 const [newYearInput,setNewYearInput]=React.useState("");
 const [showNewYear,setShowNewYear]=React.useState(false);

 // Chargement API au demarrage
 useEffect(function(){
  if(!apiIsConfigured()||apiLoaded) return;
  apiLoad().then(function(data){
   if(data){
    var migrated=migrateState(data);
    if(window.buildSlotsFromState) window.buildSlotsFromState(migrated);
    setStateRaw(migrated);
    setApiStatus("synced");
   }
   setApiLoaded(true);
  }).catch(function(e){
   console.warn("API load failed, using localStorage:", e);
   setApiLoaded(true);
  });
 },[]);

 // Sauvegarde locale + API
 useEffect(()=>{
  setSaveStatus("saving");
  const t=setTimeout(()=>{
   try{
    localStorage.setItem(LS_KEY,JSON.stringify(state));
    // Sync API si configuree et session admin
    if(apiIsConfigured()&&session&&session.role==="admin"){
     setApiStatus("syncing");
     apiSave(state).then(function(){
      setApiStatus("synced");
      setSaveStatus("saved");
     }).catch(function(e){
      setApiStatus("error");
      setSaveStatus("saved"); // localStorage OK meme si API echoue
     });
    } else {
     setSaveStatus("saved");
    }
   }
   catch(e){setSaveStatus("error");}
  },800);
  return()=>clearTimeout(t);
 },[state]);

 var activeYear=state.activeYear||"2025-2026";
 var otherYears=state.otherYears||{};
 var availableYears=Object.keys(Object.assign({},otherYears,{[activeYear]:true})).sort();

 function switchYear(yr){
  if(yr===activeYear) return;
  setState(function(p){
   // Sauvegarder l annee courante SANS les donnees partagees
   var saved=extractYearData(p);
   SHARED_KEYS.forEach(function(k){delete saved[k];});
   var others=Object.assign({},p.otherYears||{},{[p.activeYear||"2025-2026"]:saved});
   var target=others[yr];
   var next;
   if(target){
    next=buildYearState(target,p);
    delete others[yr];
   } else {
    next=buildYearState({
     groups:[],matrix:JSON.parse(JSON.stringify(p.matrix||[])),
     schedules:{},planFormation:{},teacherWeekHours:{},
     lockedWeeks:{},bank:[],currentWeek:1,
     presenceDays:JSON.parse(JSON.stringify(p.presenceDays||{})),
     indispos:{},constraints:{},mfrWeeks:p.mfrWeeks
    },p);
   }
   next.activeYear=yr;
   next.otherYears=others;
   return next;
  });
 }

 function addYear(yr){
  if(!yr||yr===activeYear){alert("Nom invalide ou annee deja active.");return;}
  if(state.otherYears&&state.otherYears[yr]){alert("Cette annee existe deja.");return;}
  setState(function(p){
   var others=Object.assign({},p.otherYears||{});
   others[yr]={
    groups:[],matrix:JSON.parse(JSON.stringify(p.matrix||[])),
    schedules:{},planFormation:{},teacherWeekHours:{},
    lockedWeeks:{},bank:[],currentWeek:1,
    presenceDays:JSON.parse(JSON.stringify(p.presenceDays||{})),
    indispos:{},constraints:{},mfrWeeks:p.mfrWeeks
   };
   return Object.assign({},p,{otherYears:others});
  });
 }

 if(!session)return(<LoginScreen state={state} onAdmin={()=>setSession({role:"admin"})} onTeacher={(t)=>setSession({role:"teacher",teacher:t})} />);

 var yearBanner=(
  <div className="year-banner" style={{background:"#1e3a5f",color:"#fff",padding:"5px 16px",
   display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",fontSize:12}}>
   <span style={{fontWeight:700,opacity:0.7,fontSize:11}}>Annee scolaire :</span>
   {availableYears.map(function(yr){return(
    <button key={yr} onClick={function(){switchYear(yr);}}
     style={{padding:"3px 12px",borderRadius:6,cursor:"pointer",fontSize:11,
     fontFamily:"inherit",fontWeight:yr===activeYear?700:400,
     background:yr===activeYear?"#ceab5d":"transparent",
     color:yr===activeYear?"#1e3a5f":"#cbd5e1",
     border:"1px solid "+(yr===activeYear?"#ceab5d":"#475569")}}>
     {yr+(yr===activeYear?" (active)":"")}
    </button>
   );})}
   {!showNewYear?(
    <button onClick={function(){setShowNewYear(true);setNewYearInput("");}}
     style={{padding:"3px 10px",borderRadius:6,cursor:"pointer",fontSize:11,
     fontFamily:"inherit",background:"transparent",color:"#94a3b8",
     border:"1px dashed #475569"}}>
     + Nouvelle annee
    </button>
   ):(
    <div style={{display:"flex",gap:4,alignItems:"center"}}>
     <input autoFocus type="text" value={newYearInput}
      onChange={function(e){setNewYearInput(e.target.value);}}
      onKeyDown={function(e){
       if(e.key==="Enter"&&newYearInput.trim()){addYear(newYearInput.trim());setShowNewYear(false);}
       if(e.key==="Escape"){setShowNewYear(false);}
      }}
      placeholder="ex: 2026-2027"
      style={{padding:"2px 8px",borderRadius:6,border:"1px solid #475569",
      background:"#1e3a5f",color:"#fff",fontFamily:"inherit",fontSize:11,width:110}}/>
     <button onClick={function(){
      if(newYearInput.trim()){addYear(newYearInput.trim());setShowNewYear(false);}
     }} style={{padding:"2px 8px",borderRadius:6,cursor:"pointer",fontSize:11,
      fontFamily:"inherit",background:"#ceab5d",color:"#1e3a5f",border:"none",fontWeight:700}}>
      OK
     </button>
     <button onClick={function(){setShowNewYear(false);}}
      style={{padding:"2px 6px",borderRadius:6,cursor:"pointer",fontSize:11,
      fontFamily:"inherit",background:"transparent",color:"#94a3b8",border:"1px solid #475569"}}>
      x
     </button>
    </div>
   )}
   <span style={{marginLeft:"auto",opacity:0.8,fontSize:10,display:"flex",gap:12,alignItems:"center"}}>
    {apiIsConfigured()&&(
     <span style={{display:"flex",alignItems:"center",gap:4}}>
      <span style={{width:7,height:7,borderRadius:"50%",display:"inline-block",
       background:apiStatus==="synced"?"#4ade80":apiStatus==="syncing"?"#fbbf24":apiStatus==="error"?"#f87171":"#94a3b8"}}/>
      <span style={{color:"#cbd5e1"}}>
       {apiStatus==="synced"?"OVH synced":apiStatus==="syncing"?"Sync...":apiStatus==="error"?"Erreur sync":"Local"}
      </span>
     </span>
    )}
    <span title="Equipe et config etablissement partagees" style={{color:"#93c5fd"}}>
     Equipe & etab. partages
    </span>
    {Object.keys(otherYears).length>0&&(
     <span style={{color:"#94a3b8"}}>{Object.keys(otherYears).length+" annee(s) en memoire"}</span>
    )}
   </span>
  </div>
 );

 if(session.role==="admin")return(
  <div>
   {yearBanner}
   <DirectorSpace state={state} setState={setState} saveStatus={saveStatus} onLogout={()=>setSession(null)} apiStatus={apiStatus} apiIsConfigured={apiIsConfigured}/>
  </div>
 );
 if(session.role==="teacher")return(
  <div>
   {yearBanner}
   <TeacherSpace teacher={session.teacher} state={state} setState={setState} onLogout={async function(){await apiLogout();setSession(null);}}/>
  </div>
 );
 return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
