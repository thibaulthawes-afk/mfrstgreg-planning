function getSlotsFromState(state){
 var src=(state&&state.etab&&state.etab.slots)||null;
 var lunch=(state&&state.etab&&state.etab.lunchBreak)||{start:"12:45",end:"13:45"};
 function getPeriod(sl){
  if(sl.period) return sl.period;
  if(sl.end&&sl.end<=lunch.start) return "morning";
  if(sl.start&&sl.start>=lunch.end) return "afternoon";
  return "morning";
 }
 if(!src) return DEFAULT_SLOTS_BY_DAY;
 return src.map(function(daySlots){
  return daySlots.map(function(sl,si){
   return {id:si,_id:sl._id||null,label:sl.label||(sl.start.replace(":","h")+"-"+sl.end.replace(":","h")),
    start:sl.start,end:sl.end,dur:1.0,
    period:getPeriod(sl),
    isAccueil:!!sl.isAccueil,isBilan:!!sl.isBilan,isBreak:!!sl.isBreak};
  });
 });
}
function buildSlotsFromState(state){

function getCurrentWeek(){
 var d=new Date(),jan4=new Date(d.getFullYear(),0,4);
 var dow=jan4.getDay()||7,w1=new Date(jan4);
 w1.setDate(jan4.getDate()-(dow-1));
 return Math.ceil(((d-w1)/86400000+1)/7);
}
function getWeekLabel(wn){
 var yr=wn<30?2027:2026,jan4=new Date(yr,0,4);
 var dow=jan4.getDay()||7,w1=new Date(jan4);
 w1.setDate(jan4.getDate()-(dow-1));
 var mon=new Date(w1);mon.setDate(w1.getDate()+(wn-1)*7);
 var fri=new Date(mon);fri.setDate(mon.getDate()+4);
 function fmt(d){return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");}
 return "S"+wn+" "+fmt(mon)+"-"+fmt(fri);
}

 if(di!==undefined&&SLOTS_BY_DAY[di])return SLOTS_BY_DAY[di];

}
function isTP(subj,etab){
 var l=(etab&&etab.tpSubjects)||["Travaux pratiques","TP Entretien","TP Infrastructure","TP Vegetalisation","NJPF Travaux pratiques","AP Travaux pratiques","JP Travaux pratiques"];
 return l.some(function(x){return subj&&subj.indexOf(x)>=0;});
}

}
function getWeeklyHours(m,group){
 var pw=(group.calendar||[]).filter(function(w){return w.present;}).length||32;
 return((m.hoursAnnual||0)-(m.hoursExam||0))/Math.max(1,pw);
}
function getGroupement(gid,etab){
 return((etab&&etab.regroupements)||[]).find(function(rg){return rg.groupIds&&rg.groupIds.indexOf(gid)>=0;})||null;
}
function isMGCourse(req,matrix,etab){
 if(req.courseType==="MG")return true;
 if(req.courseType==="MP")return false;
 var rg=getGroupement(req.groupId,etab);
 if(!rg)return false;
 return rg.groupIds.filter(function(id){return id!==req.groupId;}).some(function(sid){
  return matrix.some(function(m){return m.groupId===sid&&m.subject===req.subject&&m.teacherId===req.teacherId&&!m.isMGReceiver;});
 });
}
function migrateState(d){
 if(!d)d={};
 var de=DEFAULT_ETAB;
 if(!d.etab)d.etab=JSON.parse(JSON.stringify(de));
 if(!d.etab.rules)d.etab.rules=de.rules;

 if(!d.etab.epsSubjects)d.etab.epsSubjects=de.epsSubjects;
 if(!d.etab.levelSlots)d.etab.levelSlots=de.levelSlots;
 if(!d.etab.regroupements)d.etab.regroupements=de.regroupements;
 if(!d.etab.groupWeekCap)d.etab.groupWeekCap=35;
 if(!d.etab.slots)d.etab.slots=JSON.parse(JSON.stringify(de.slots));
 if(!d.etab.lunchBreak)d.etab.lunchBreak=Object.assign({},de.lunchBreak);
 ["matrix","teachers","groups","rooms","emergencyLog"].forEach(function(k){if(!d[k])d[k]=[];});
 ["constraints","schedules","planFormation","epiPlanning","voyages","teacherWeekHours"].forEach(function(k){if(!d[k])d[k]={};});
 if(!d.currentWeek)d.currentWeek=getCurrentWeek();
 d.teachers.forEach(function(t){if(!t.pin)t.pin="0000";if(!t.partialDays)t.partialDays=[];});
 d.rooms.forEach(function(r){if(!r.blocked)r.blocked=[];});
 d.matrix.forEach(function(m){if(m.hoursExam===undefined)m.hoursExam=0;});
 if(!d.activeYear) d.activeYear="2025-2026";
 if(!d.otherYears) d.otherYears={};
 return d;
}
function computeRealisees(schedule,weekNum,groups,etab){
 var result={};
 if(!schedule)return result;
 groups.forEach(function(g){
  var gs=schedule[g.id]||{};
  var hr={};
  DAYS.forEach(function(_,di){
   var daySlots=SLOTS_BY_DAY[di]||SLOTS_1H;
   daySlots.forEach(function(sl){
    var cell=gs[di]&&gs[di][sl.id];
    if(!cell||cell.isReserved)return;
    var key=cell.subject+"|||"+cell.teacherId;
    hr[key]=(hr[key]||0)+sl.dur;
   });
  });
  result[g.id]=hr;
 });
 return result;
}

   var sem = pf.semaines[wn];
   var heures = sem.heures||{};

function ensureSched(sched, gid, di){

function genSchedule(state, currentWeek, pfHints, targetGroupId){

 var etab=state.etab||DEFAULT_ETAB;

 // Groupes à générer
 var activeGroups=groups.filter(function(g){

     sched[gid][di][slB.id]={subject:course.subject,teacherId:course.teacherId,roomId:"r1",courseType:course.courseType,isDouble:true};
     usedSlots.add(keyA); usedSlots.add(keyB);
     tDayH[course.teacherId][di]=(tDayH[course.teacherId][di]||0)+2;
     tDayH[course.teacherId]["week"]=(tDayH[course.teacherId]["week"]||0)+2;
     if(!dayCount[di][course.subject]) dayCount[di][course.subject]=0;
     dayCount[di][course.subject]+=2;
     placed=true;
    }
   }
   if(!placed&&course.hasPF){
    // Fallback forcé pour PF : 1 créneau même si pas de paire
    toPlace.unshift(Object.assign({},course,{needs2:false}));
   }
  });

  // ── Placement 1h (R1 : 1 max par jour par matière) ─────────────────────────
  var freeSlots2=freeSlots.filter(function(slot){
   return !usedSlots.has(slot.di+"_"+slot.si)&&
    !(sched[gid]&&sched[gid][slot.di]&&sched[gid][slot.di][slot.si]);
  });
  // Trier freeSlots2 : distribuer les jours (éviter slots consécutifs même jour)
  // Tri : AM de tous les jours d'abord, puis PM de tous les jours
  // Et dans chaque periode, alterner les jours pour distribuer
  freeSlots2.sort(function(a,b){
   var aP=a.period==="morning"?0:1;
   var bP=b.period==="morning"?0:1;
   if(aP!==bP) return aP-bP; // AM avant PM
   // Même période : trier par jour pour alterner les jours
   return a.di-b.di;
  });

  var remaining=toPlace.slice();

  freeSlots2.forEach(function(slot){
   if(!remaining.length) return;

   function scoreC(course){
    var sc=0;
    // R9 indispo
    var tInd=(indispos[course.teacherId]&&course.teacherId&&indispos[course.teacherId][currentWeek])||{};
    if(tInd[slot.di]&&tInd[slot.di][slot.si]) return 9999;
    // R7 présence
    var pd=presenceDays[course.teacherId]||{};
    var presDay=pd[slot.di]||"full";
    if(presDay==="absent") return 9999;
    if(presDay==="am"&&slot.period==="afternoon") return 9999;
    if(presDay==="pm"&&slot.period==="morning") return 9999;
    // R8 max semaine
    if((tDayH[course.teacherId]&&tDayH[course.teacherId]["week"]||0)>=maxHDay[course.teacherId]) return 9999;
    // R1 STRICTE : jamais 2x même matière même jour si slotSize=1
    if(!course.needs2&&(dayCount[slot.di][course.subject]||0)>0) return 9999;
    // R3 : matin obligatoire si constraint=morning ET creneaux AM encore disponibles
    if(course.constraint==="morning"&&slot.period==="afternoon"){
     // Vérifier s'il reste des créneaux AM libres pour ce groupe
     var hasAMfree=freeSlots2.some(function(fs){
      return fs.period==="morning"&&
       !(sched[gid]&&sched[gid][fs.di]&&sched[gid][fs.di][fs.si]);
     });
     if(hasAMfree) return 9999; // bloquer PM si AM disponible
     sc+=5; // accepter PM si plus d'AM
    }
    // R4 : priorité pfHints
    if(course.hasPF) sc-=100;
    // R5 : homogénéité formateur
    sc+=(tDayH[course.teacherId][slot.di]||0)*2;
    // Si pas de contrainte matin et slot AM : vérifier si des cours morning attendent
    if(course.constraint!=="morning"&&slot.period==="morning"){
     var morningWaiting=remaining.some(function(c){return c.constraint==="morning";});
     if(morningWaiting) sc+=8; // légère pénalité pour laisser les AM aux cours morning
    }
    // Priorité début de journée
    sc+=slot.si*0.1;
    return sc;
   }

   // Trouver le meilleur cours
   var best=-1, bestScore=10000;
   for(var ri=0;ri<remaining.length;ri++){
    var s=scoreC(remaining[ri]);
    if(s<bestScore){bestScore=s;best=ri;}
   }

   // Si score >= 9999 et cours PF → forcer
   if(bestScore>=9999){
    var forcePF=-1;
    for(var ri=0;ri<remaining.length;ri++){
     if(remaining[ri].hasPF){forcePF=ri;break;}
    }
    if(forcePF>=0) best=forcePF;
    else return;
   }

   var sel=remaining.splice(best,1)[0];
   ensureSched(sched,gid,slot.di);
   sched[gid][slot.di][slot.si]={
    subject:sel.subject,teacherId:sel.teacherId,
    roomId:"r1",courseType:sel.courseType
   };
   if(!dayCount[slot.di][sel.subject]) dayCount[slot.di][sel.subject]=0;
   dayCount[slot.di][sel.subject]++;
   if(tDayH[sel.teacherId]){
    tDayH[sel.teacherId][slot.di]=(tDayH[sel.teacherId][slot.di]||0)+1;
    tDayH[sel.teacherId]["week"]=(tDayH[sel.teacherId]["week"]||0)+1;
   }
  });

  // Rattrapage : cours PF non placés
  if(remaining.length>0){
   var leftover=freeSlots2.filter(function(slot){
    return !(sched[gid]&&sched[gid][slot.di]&&sched[gid][slot.di][slot.si]);
   });
   leftover.forEach(function(slot){
    if(!remaining.length) return;
    var sel=remaining.shift();
    ensureSched(sched,gid,slot.di);
    sched[gid][slot.di][slot.si]={subject:sel.subject,teacherId:sel.teacherId,roomId:"r1",courseType:sel.courseType};
   });
  }

  // ── Splits PF (dédoublements semaine) ─────────────────────────────────────
  var pfSplits=pfSemaine.splits||{};
  var pfMerges=pfSemaine.merges||{};

  Object.keys(pfSplits).forEach(function(matKeyA){
   var sp=pfSplits[matKeyA];
   if(!sp.subjectB||!sp.teacherIdB) return;
   var parts=matKeyA.split("|||");
   var placed=false;
   for(var di=0;di<5&&!placed;di++){
    var daySlots=SLOTS_BY_DAY[di]||SLOTS_1H;
    for(var si=0;si<daySlots.length-1&&!placed;si++){
     var slA=daySlots[si], slB=daySlots[si+1];
     if(slA.isAccueil||slA.isBilan||slA.isBreak||slB.isBilan||slB.isBreak) continue;
     // Vérifier que slA et slB sont vraiment consécutifs (pas de pause entre les deux)
     if(slA.end&&slB.start&&slA.end!==slB.start) continue;
     if(sched[gid][di]&&(sched[gid][di][slA.id]||sched[gid][di][slB.id])) continue;
     ensureSched(sched,gid,di);
     sched[gid][di][slA.id]={subject:parts[0],teacherId:parts[1],roomId:"r1",courseType:"MP",isSplitA:true};
     sched[gid][di][slB.id]={subject:sp.subjectB,teacherId:sp.teacherIdB,roomId:"r1",courseType:"MP",isSplitB:true};
     placed=true;
    }
   }
  });

  Object.keys(pfMerges).forEach(function(matKeyA){
   var mg=pfMerges[matKeyA];
   if(!mg.withGroupId) return;
   var partnerSched=sched[mg.withGroupId];
   if(!partnerSched) return;
   var parts=matKeyA.split("|||");
   DAYS.forEach(function(_,di){
    var daySlots=SLOTS_BY_DAY[di]||SLOTS_1H;
    daySlots.forEach(function(sl){
     var cell=sched[gid]&&sched[gid][di]&&sched[gid][di][sl.id];
     if(cell&&cell.subject===parts[0]&&cell.teacherId===parts[1]){
      if(!partnerSched[di]) partnerSched[di]={};
      if(!partnerSched[di][sl.id]) partnerSched[di][sl.id]=Object.assign({},cell,{isMerged:true,mergedFrom:gid});
     }
    });
   });
  });

  // ── Regroupements MG ───────────────────────────────────────────────────────
  var regroupements=(etab&&etab.regroupements)||[];
  regroupements.forEach(function(rg){
   if(rg.groupIds.indexOf(gid)<0) return;
   var partners=rg.groupIds.filter(function(pid){return pid!==gid&&sched[pid];});
   if(!partners.length) return;
   DAYS.forEach(function(_,di){
    var daySlots=SLOTS_BY_DAY[di]||SLOTS_1H;
    daySlots.forEach(function(sl){
     var cell=sched[gid]&&sched[gid][di]&&sched[gid][di][sl.id];
     if(!cell||cell.isReserved) return;
     var isMG=partners.every(function(pid){
      return matrix.some(function(m){
       return m.groupId===pid&&m.subject===cell.subject&&m.teacherId===cell.teacherId&&!m.isMGReceiver;
      });
     });
     if(isMG){
      partners.forEach(function(pid){
       if(sched[pid]&&sched[pid][di]&&!sched[pid][di][sl.id]){
        sched[pid][di][sl.id]=Object.assign({},cell,{isMGReceiver:true});
       }
      });
     }
    });
   });
  });

 }); // fin gOrder.forEach

  // Calculer et retourner les heures par formateur cette semaine
  var teacherHoursThisWeek={};
  teachers.forEach(function(t){
   teacherHoursThisWeek[t.id]=tDayH[t.id]&&tDayH[t.id]["week"]||0;
  });

 return{schedule:sched,conflicts:conflicts,teacherHoursThisWeek:teacherHoursThisWeek};
}

async function genScheduleAI(state, currentWeek, pfHints, targetGroupId, onProgress) {
 if(!pfHints) pfHints={};
 var groups=state.groups, teachers=state.teachers, matrix=state.matrix;
 var etab=state.etab||DEFAULT_ETAB;

 // Groupes à planifier
 var activeGroups=groups.filter(function(g){
  var present=(g.calendar||[]).some(function(w){return w.week===currentWeek&&w.present;});
  if(!present) return false;
  if(targetGroupId) return g.id===targetGroupId;
  return true;
 });

 // Construire le contexte pour l'IA (compact)
 var slots_per_day=[6,7,7,7,6]; // lundi accueil, vendredi bilan
 var DAYS_NAMES=["Lundi","Mardi","Mercredi","Jeudi","Vendredi"];

 var conflicts_total=[];
 var final_schedule={};

 // Copier l'existant si génération partielle
 if(targetGroupId && state.schedules && state.schedules[String(currentWeek)]){
  var ex=state.schedules[String(currentWeek)];
  Object.keys(ex).forEach(function(gid){
   if(gid!==targetGroupId) final_schedule[gid]=JSON.parse(JSON.stringify(ex[gid]));
  });
 }

 // Générer d'abord avec le moteur classique (base)
 var baseResult=genSchedule(state, currentWeek, pfHints, targetGroupId);
 var baseSched=baseResult.schedule;
 var conflicts=baseResult.conflicts;

 // Copier le planning de base
 Object.keys(baseSched).forEach(function(gid){
  final_schedule[gid]=JSON.parse(JSON.stringify(baseSched[gid]));
 });

 // Si pas de conflits → retourner directement
 if(!conflicts || conflicts.length===0){
  if(onProgress) onProgress("Planning complet genere sans conflits.", 100);
  return{schedule:final_schedule, conflicts:[]};
 }

 if(onProgress) onProgress(conflicts.length+" matiere(s) non placee(s). Appel IA pour resolution...", 20);

 // Pour chaque groupe avec conflits, demander à l'IA de résoudre
 var conflictGroups=[...new Set(conflicts.map(function(c){return c.groupId;}))];

 for(var ci=0;ci<conflictGroups.length;ci++){
  var gid=conflictGroups[ci];
  var g=groups.find(function(x){return x.id===gid;});
  if(!g) continue;

  var gConflicts=conflicts.filter(function(c){return c.groupId===gid;});
  var gSched=final_schedule[gid]||{};

  // Construire la grille actuelle (ce qui est déjà placé)
  var placed=[];
  DAYS_NAMES.forEach(function(_,di){
   var ds=SLOTS_BY_DAY[di]||SLOTS_1H;
   ds.forEach(function(sl){
    var cell=gSched[di]&&gSched[di][sl.id];
    if(cell&&!cell.isReserved) placed.push({day:DAYS_NAMES[di],slot:sl.label,subject:cell.subject,teacher:cell.teacherId});
   });
  });

  // Occupation formateurs (toutes les grilles déjà placées)
  var teacherBusy={};
  Object.keys(final_schedule).forEach(function(ogid){
   var os=final_schedule[ogid];
   DAYS_NAMES.forEach(function(_,di){
    var ds=SLOTS_BY_DAY[di]||SLOTS_1H;
    ds.forEach(function(sl){
     var cell=os[di]&&os[di][sl.id];
     if(cell&&!cell.isReserved&&cell.teacherId){
      var key=cell.teacherId+"_"+di+"_"+sl.id;
      if(!teacherBusy[key]) teacherBusy[key]=[];
      teacherBusy[key].push(ogid);
     }
    });
   });
  });

  // Créneaux libres dans la grille du groupe
  var freeSlots=[];
  DAYS_NAMES.forEach(function(_,di){
   var ds=SLOTS_BY_DAY[di]||SLOTS_1H;
   ds.forEach(function(sl){
    if(sl.isAccueil||sl.isBilan) return;
    if(gSched[di]&&gSched[di][sl.id]) return;
    freeSlots.push({day:DAYS_NAMES[di],dayIdx:di,slotId:sl.id,label:sl.label});
   });
  });

  // Construire le prompt pour l'IA
  var toPlace=gConflicts.map(function(c){
   var t=teachers.find(function(x){return x.id===c.teacherId||x.id===c.subject;});
   // Chercher le teacherId depuis la matrice
   var mrow=matrix.find(function(m){return m.groupId===gid&&m.subject===c.subject&&!m.isMGReceiver;});
   var tid=mrow?mrow.teacherId:"?";
   var tobj=teachers.find(function(x){return x.id===tid;});
   // Créneaux libres pour ce formateur
   var tFreeSlots=freeSlots.filter(function(fs){
    var key=tid+"_"+fs.dayIdx+"_"+fs.slotId;
    return !teacherBusy[key];
   });
   return{
    subject:c.subject,
    teacherId:tid,
    teacherName:tobj?tobj.name:"?",
    needed:c.needed,
    placed:c.placed,
    missing:Math.round((c.needed-c.placed)*10)/10,
    availableSlots:tFreeSlots.map(function(fs){return fs.day+" "+fs.label;})
   };
  });

  var prompt=[
   "Tu es un expert en planification scolaire MFR.",
   "Groupe: "+g.name+", Semaine S"+currentWeek,
   "",
   "Matieres non placees:",
   JSON.stringify(toPlace),
   "",
   "Creneaux libres: "+freeSlots.map(function(fs){return fs.day+" "+fs.label;}).join(", "),
   "",
   "Planning actuel: "+placed.map(function(p){return p.day+" "+p.slot+": "+p.subject;}).join(" | "),
   "",
   "Pour chaque matiere manquante, trouve le meilleur creneau libre.",
   "Si besoin, propose un echange (swap) entre deux cours deja places.",
   "Distribuer sur plusieurs jours differents.",
   "",
   "Reponds UNIQUEMENT en JSON valide sans markdown:",
   '{"placements":[{"subject":"NomMatiere","dayIdx":0,"slotId":1}],"swaps":[{"day1":0,"slot1":1,"day2":2,"slot2":3}]}'
  ].join("\n")

  try{
   if(onProgress) onProgress("IA en train de resoudre "+g.name+"...", 20+ci*60/conflictGroups.length);

   var response=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
     model:"claude-sonnet-4-20250514",
     max_tokens:2000,
     messages:[{role:"user",content:prompt}]
    })
   });

   var data=await response.json();
   var text=data.content&&data.content[0]&&data.content[0].text||"{}";
   var clean=text.replace(/```json|```/g,"").trim();
   var result=JSON.parse(clean);

   // Appliquer les placements IA
   var gs=JSON.parse(JSON.stringify(final_schedule[gid]||{}));
   if(!gs) gs={};

   (result.placements||[]).forEach(function(p){
    var di=p.dayIdx;
    if(!gs[di]) gs[di]={};
    var tid=matrix.find(function(m){return m.groupId===gid&&m.subject===p.subject&&!m.isMGReceiver;});
    var teachId=tid?tid.teacherId:null;
    if(teachId){
     gs[di][p.slotId]={subject:p.subject,teacherId:teachId,roomId:"ai_placed",courseType:"MP"};
    }
   });

   // Appliquer les swaps IA
   (result.swaps||[]).forEach(function(sw){
    var d1=sw.day1!==undefined?sw.day1:DAYS_NAMES.indexOf(sw.day1);
    var d2=sw.day2!==undefined?sw.day2:DAYS_NAMES.indexOf(sw.day2);
    // Trouver les dayIdx depuis le nom du jour
    d1=DAYS_NAMES.indexOf(sw.day1||"");
    d2=DAYS_NAMES.indexOf(sw.day2||"");
    if(d1<0||d2<0) return;
    if(!gs[d1]||!gs[d2]) return;
    var tmp=gs[d1][sw.slot1];
    gs[d1][sw.slot1]=gs[d2][sw.slot2]||null;
    gs[d2][sw.slot2]=tmp||null;
    if(!gs[d1][sw.slot1]) delete gs[d1][sw.slot1];
    if(!gs[d2][sw.slot2]) delete gs[d2][sw.slot2];
   });

   final_schedule[gid]=gs;

  } catch(e){
   console.error("Erreur IA pour "+g.name+":", e);
   conflicts_total=conflicts_total.concat(gConflicts);
  }
 }

 if(onProgress) onProgress("Planning finalise.", 100);
 return{schedule:final_schedule, conflicts:conflicts_total};
}

// Hook detection mobile
function useIsMobile(){
 var [mob,setMob]=React.useState(window.innerWidth<768);
 React.useEffect(function(){
  function h(){setMob(window.innerWidth<768);}
  window.addEventListener("resize",h);
  return function(){window.removeEventListener("resize",h);};
 },[]);
 return mob;
}

// -- PINSCREEN -----------------------------------------------------------------
function PinScreen({title,subtitle,icon,validPin,onSuccess,onBack}){
 const [pin,setPin]=useState(["","","",""]);
 const [err,setErr]=useState(false);
 const refs=[useRef(),useRef(),useRef(),useRef()];
 function handleKey(i,v){
  if(!/^\d?$/.test(v))return;
  const np=[...pin];np[i]=v;setPin(np);
  if(v&&i<3&&refs[i+1].current)refs[i+1].current.focus();
  if(np.every(x=>x)){
   if(np.join("")===validPin){onSuccess();}
   else{setErr(true);setTimeout(()=>{setPin(["","","",""]);setErr(false);if(refs[0].current)refs[0].current.focus();},600);}
  }
 }
 return(
  <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F}}>
   <div style={{maxWidth:320,width:"100%",textAlign:"center",padding:24}}>
    <div style={{fontSize:40,marginBottom:8}}>{icon}</div>
    <div style={{fontFamily:FS,fontSize:18,fontWeight:700,color:C.brun,marginBottom:4}}>{title}</div>
    <div style={{fontSize:12,color:C.mut,marginBottom:24}}>{subtitle}</div>
    <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
     {pin.map((v,i)=>(
      <input key={i} ref={refs[i]} type="password" maxLength={1} value={v}
       onChange={e=>handleKey(i,e.target.value)}
       style={{width:48,height:52,textAlign:"center",fontSize:20,fontWeight:700,
       border:"2px solid "+(err?C.red:C.bord),borderRadius:10,
       background:err?"#fff0f0":"#fff",fontFamily:F}}/>
     ))}
    </div>
    {err&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>Code incorrect</div>}
    <button onClick={onBack} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:12,fontFamily:F}}>
      Retour
    </button>
   </div>
  </div>
 );
}

  var tok=params.get("token");
  var role=params.get("role");
  var authError=params.get("auth_error");
  if(authError){ setError(decodeURIComponent(authError)); return; }
  if(tok&&role==="teacher"){

 }

   if(res.step==="2fa_required"){setStep("2fa");setLoading(false);return;}

  if(!twoFaCode||twoFaCode.length!==6){setError("Code 6 chiffres requis");return;}

function WeekCalendar({groups,selectedGroup,selectedWeek,onSelectWeek,schedules,planFormation,lockedWeeks}){
 const group=groups.find(g=>g.id===selectedGroup);
 const cal=(group&&group.calendar||[])
  .filter(w=>w.present)
  .sort((a,b)=>(a.week<30?a.week+52:a.week)-(b.week<30?b.week+52:b.week));
 const months=[
  {label:"Sep",weeks:[35,36,37,38]},{label:"Oct",weeks:[39,40,41,42,43]},
  {label:"Nov",weeks:[44,45,46,47]},{label:"Dec",weeks:[48,49,50,51,52]},
  {label:"Jan",weeks:[1,2,3,4,5]},{label:"Fev",weeks:[6,7,8,9]},
  {label:"Mar",weeks:[10,11,12,13]},{label:"Avr",weeks:[14,15,16,17]},
  {label:"Mai",weeks:[18,19,20,21,22]},{label:"Jun",weeks:[23,24,25,26]},
 ];
 const presentW=new Set(cal.map(w=>w.week));
 const schedW=new Set(Object.keys(schedules||{}).map(Number));
 const pfG=(planFormation||{})[selectedGroup];
 const pfW=new Set(Object.keys((pfG&&pfG.semaines)||{}).filter(wn=>{
  const h=(pfG.semaines[wn]&&pfG.semaines[wn].heures)||{};
  return Object.keys(h).length>0;
 }).map(Number));
 return(
  <div style={{background:C.card,border:"1px solid "+C.bord,borderRadius:10,padding:"8px 12px",marginBottom:10}}>
   <div style={{fontSize:10,fontWeight:700,color:C.mut,textTransform:"uppercase",marginBottom:6,display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
    <span>Navigation rapide</span>
    <span style={{display:"flex",gap:6,alignItems:"center",fontWeight:400}}>
     <span style={{width:10,height:10,borderRadius:2,background:C.olive,display:"inline-block"}}></span>Plan saisi
     <span style={{width:10,height:10,borderRadius:2,background:C.brun,display:"inline-block",marginLeft:4}}></span>Planning
     <span style={{width:10,height:10,borderRadius:2,background:C.creme,border:"1px solid "+C.bord,display:"inline-block",marginLeft:4}}></span>Presence
    </span>
   </div>
   <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
    {months.map(m=>{
     const mw=m.weeks.filter(w=>presentW.has(w));
     if(!mw.length)return null;
     return(
      <div key={m.label}>
       <div style={{fontSize:9,fontWeight:700,color:C.mut,textTransform:"uppercase",marginBottom:2,textAlign:"center"}}>{m.label}</div>
       <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
        {mw.map(wn=>{
         const isSel=selectedWeek===wn;
         const hasPlan=pfW.has(wn);
         const hasSched=schedW.has(wn);
         const bg=isSel?C.brun:hasPlan?C.accD:hasSched?"#e8e0cc":C.creme;
         const color=isSel?"#fff":hasPlan?C.olive:hasSched?C.brun:C.dim;
         const border=isSel?"2px solid "+C.brun:hasPlan?"1px solid "+C.olive:"1px solid "+C.bord;
         return(
          <button key={wn} onClick={()=>onSelectWeek(wn)}
           title={"S"+wn+(hasSched?" Planning":" ")+(hasPlan?" Plan":"")+(lockedWeeks&&lockedWeeks[wn]?" VERROUILLE":"")}
           style={{width:24,height:20,borderRadius:3,border,background:lockedWeeks&&lockedWeeks[wn]?"#c8e6c9":bg,color,fontFamily:F,
           fontSize:9,fontWeight:isSel||hasPlan?700:400,cursor:"pointer",padding:0,
           boxShadow:lockedWeeks&&lockedWeeks[wn]?"inset 0 0 0 1px #4caf50":"none"}}>
           {lockedWeeks&&lockedWeeks[wn]?"v":wn}
          </button>
         );
        })}
       </div>
      </div>
     );
    })}
   </div>
  </div>
 );
}

function ManualCourseModal({editRes,group,state,setState,gs,updateSchedule,onClose,C,F,FS}){
 var SLOTS_BY_DAY=getSlotsFromState(state); var SLOTS_1H=SLOTS_BY_DAY[1]||SLOTS_BY_DAY[0];
 const di=editRes.di, si=editRes.si;
 const cell=editRes.cell;
 const cw2=editRes.cw;

 function isTeacherAvailable(tid){
  var ind=(state.indispos&&state.indispos[tid]&&state.indispos[tid][cw2])||{};
  if(ind[di]&&ind[di][si]) return false;
  var pd=(state.presenceDays&&state.presenceDays[tid])||{};
  var presDay=pd[di]||"full";
  if(presDay==="absent") return false;
  var slotObj=SLOTS_BY_DAY[di]&&SLOTS_BY_DAY[di].find(function(s){return s.id===si;});
  var period=slotObj&&slotObj.period;
  if(presDay==="am"&&period==="afternoon") return false;
  if(presDay==="pm"&&period==="morning") return false;
  var schedW=(state.schedules&&(state.schedules[cw2]||state.schedules[String(cw2)]))||{};
  var busy=Object.keys(schedW).some(function(gid){
   if(gid===group.id) return false;
   var c2=schedW[gid]&&schedW[gid][di]&&schedW[gid][di][si];
   return c2&&c2.teacherId===tid&&!c2.isReserved;
  });
  return !busy;
 }

 var matieresDispos=state.matrix.filter(function(m){
  return m.groupId===group.id&&!m.isMGReceiver&&isTeacherAvailable(m.teacherId);
 });
 var matieresIndispos=state.matrix.filter(function(m){
  return m.groupId===group.id&&!m.isMGReceiver&&!isTeacherAvailable(m.teacherId);
 });

 const [selSubject,setSelSubject]=React.useState(
  cell?cell.subject:(matieresDispos[0]&&matieresDispos[0].subject)||""
 );
 const [selTeacher,setSelTeacher]=React.useState(cell?cell.teacherId||"":"");

 var matchTeachers=state.teachers.filter(function(t){

 if(!matchTeachers.length) matchTeachers=state.teachers.filter(function(t){return isTeacherAvailable(t.id);});

 // Groupes presents cette semaine (pour regroupement)
 var groupsPresent=state.groups.filter(function(g){

 // Formateurs disponibles pour sous-groupe B (dedoublement)
 var teachersB=state.teachers.filter(function(t){

 function save(){
  var newGs=JSON.parse(JSON.stringify(gs));
  if(!newGs[di]) newGs[di]={};
  if(!selSubject){
   delete newGs[di][si];
  } else {
   var matRow=state.matrix.find(function(m){return m.groupId===group.id&&m.subject===selSubject;});
   var ct=(matRow&&matRow.courseType)||"MP";
   newGs[di][si]={
    subject:selSubject,teacherId:selTeacher||null,
    courseType:ct,roomId:"r1",isManual:true,
    isTP:selIsTP,
    splitGroup:selMode==="split"?"A":null,
    subjectB:selMode==="split"?selSubjectB:null,
    teacherIdB:selMode==="split"?selTeacherB:null,
    mergeGroup:selMode==="merge"?selMergeGroup:null
   };
   // Dedoublement : placer B sur le creneau suivant
   if(selMode==="split"&&selSubjectB){
    newGs[di][si+1]={
     subject:selSubjectB,teacherId:selTeacherB||null,
     courseType:"MP",roomId:"r1",isManual:true,splitGroup:"B"
    };
   }
  }
  updateSchedule(newGs);
  // Regroupement : copier dans le groupe partenaire
  if(selMode==="merge"&&selMergeGroup&&selSubject){
   setState(function(p){
    var sched2=JSON.parse(JSON.stringify(p.schedules||{}));
    var wk=String(cw2);
    if(!sched2[wk]) sched2[wk]={};
    if(!sched2[wk][selMergeGroup]) sched2[wk][selMergeGroup]={};
    if(!sched2[wk][selMergeGroup][di]) sched2[wk][selMergeGroup][di]={};
    sched2[wk][selMergeGroup][di][si]=Object.assign({},newGs[di][si],{isMerged:true,mergedFrom:group.id});
    return Object.assign({},p,{schedules:sched2});
   });
  }
  onClose();
 }

 function remove(){
  var newGs=JSON.parse(JSON.stringify(gs));
  if(newGs[di]) delete newGs[di][si];
  updateSchedule(newGs);
  onClose();
 }

 var slotLabel=SLOTS_BY_DAY[di]&&SLOTS_BY_DAY[di].find(function(s){return s.id===si;});
 var slotLabelNext=SLOTS_BY_DAY[di]&&SLOTS_BY_DAY[di].find(function(s){return s.id===si+1;});

 return(

function PlanningRows({sbd,gs,isCont,C,F,isLocked,drag,dropTarget,state,
 setDrag,setDropTarget,handleDragStart,handleDrop,setEditRes,cw,cellColor}){
 function toMins(tv){if(!tv)return 0;var pts=tv.split(":");return parseInt(pts[0])*60+(parseInt(pts[1])||0);}
 var BASE=0.75;
 // Reference = mardi (di=1)
 var refDi=1;
 if(!(sbd[1]&&sbd[1].length)){for(var rr=0;rr<5;rr++){if(sbd[rr]&&sbd[rr].length){refDi=rr;break;}}}
 var refSlots=sbd[refDi]||[];
 if(!refSlots.length) return null;

 // Mapping start -> slot pour chaque jour
 var startToSlot=DAYS.map(function(_,di){
  var map2={};
  (sbd[di]||[]).forEach(function(sl){if(sl.start)map2[sl.start]=sl;});
  return map2;
 });

 // Pour chaque (di, refStart) : ce creneau doit-il etre skipe (absorbe par rowspan) ?
 // skipCell[di][refStart] = true si ce jour a un rowspan sur la ligne precedente
 var skipCell={};
 DAYS.forEach(function(_,di){
  var dayArr=sbd[di]||[];
  for(var si2=0;si2<dayArr.length-1;si2++){
   var c1=gs[di]&&gs[di][dayArr[si2].id];
   var c2=gs[di]&&gs[di][dayArr[si2+1].id];
   if(c1&&c2&&!c1.isReserved&&!c2.isReserved
    &&c1.subject===c2.subject&&c1.teacherId===c2.teacherId
    &&!dayArr[si2+1].isBilan&&!dayArr[si2+1].isAccueil){
    if(!skipCell[di]) skipCell[di]={};
    skipCell[di][dayArr[si2+1].start]=true;
   }
  }
 });

 return refSlots.map(function(refSl,si){
  // Hauteur = duree du creneau de REFERENCE uniquement (fixe)
  var mins=refSl.start&&refSl.end?toMins(refSl.end)-toMins(refSl.start):60;
  var rowH=Math.max(14,Math.round(mins*BASE));
  var timeLabel=refSl.start?refSl.start.replace(":","h")+(refSl.end?"-"+refSl.end.replace(":","h"):""):refSl.label||"";

  if(refSl.isBreak) return(
   <tr key={"b"+si} style={{height:rowH,background:"#f1f5f9"}}>
    <td style={{padding:"2px 6px",color:"#94a3b8",fontSize:9,fontStyle:"italic",
     borderRight:"1px solid "+C.bord,verticalAlign:"middle",background:"#f1f5f9"}}>
     {timeLabel+" (pause)"}
    </td>
    {DAYS.map(function(_,di){return(
     <td key={di} style={{background:"#f1f5f9",borderRight:"1px solid "+C.bord,borderTop:"1px dashed #cbd5e1"}}/>
    );})}
   </tr>
  );

  return(
   <tr key={si} style={{height:rowH,borderBottom:"1px solid "+C.bord}}>
    <td style={{padding:"3px 6px",color:C.mut,fontSize:9,fontWeight:600,
     borderRight:"1px solid "+C.bord,verticalAlign:"middle",
     background:"#fafafa",whiteSpace:"nowrap",width:95}}>
     {timeLabel}
    </td>
    {DAYS.map(function(_,di){
     var sl=startToSlot[di][refSl.start]||null;
     // Ce jour n a pas de creneau a cette heure
     if(!sl) return(<td key={di} style={{background:"#f5f3f0",borderRight:"1px solid "+C.bord}}/>);
     // Ce creneau est absorbe par le rowspan du creneau precedent -> null = pas de <td>
     if(skipCell[di]&&skipCell[di][refSl.start]) return null;
     // Cours
     var c1=gs[di]&&gs[di][sl.id];
     var dsDay=sbd[di]||[];
     var slIdx=dsDay.findIndex(function(x){return x.start===refSl.start;});
     var nextSlot=dsDay[slIdx+1];
     var c2=nextSlot&&gs[di]&&gs[di][nextSlot.id];
     var is2h=c1&&c2&&!c1.isReserved&&!c2.isReserved
      &&c1.subject===c2.subject&&c1.teacherId===c2.teacherId
      &&nextSlot&&!nextSlot.isBilan&&!nextSlot.isAccueil;
     var rspan=is2h?2:1;
     var cell=c1;
     var tcher=cell&&cell.teacherId&&state.teachers.find(function(x){return x.id===cell.teacherId;});
     var cc=cellColor(cell);
     var isDrop=dropTarget&&dropTarget.di===di&&dropTarget.si===sl.id;
     var isDragging=drag&&drag.di===di&&drag.si===sl.id;
     var slEnd=is2h&&nextSlot&&nextSlot.end?nextSlot.end:sl.end;
     var cellTime=sl.start?sl.start.replace(":","h")+(slEnd?"-"+slEnd.replace(":","h"):""):"";
     var showTime=cellTime&&cellTime!==timeLabel;
     return(
      <td key={di} rowSpan={rspan}
       draggable={!isLocked&&!!cell&&!cell.isReserved}
       onDragStart={function(e){if(!isLocked&&cell&&!cell.isReserved)handleDragStart(e,di,sl.id);}}
       onDragEnd={function(){setDrag(null);setDropTarget(null);}}
       onDragOver={function(e){if(!isLocked){e.preventDefault();setDropTarget({di,si:sl.id});}}}
       onDragLeave={function(){setDropTarget(null);}}
       onDrop={function(e){handleDrop(e,di,sl.id);}}
       onClick={function(){if(isLocked)return;if(cell&&cell.isReserved){setEditRes({di,si:sl.id,cell});}else{setEditRes({di,si:sl.id,cell:cell||null,isManual:true,cw:cw});}}}
       style={{padding:4,borderRight:"1px solid "+C.bord,
        background:isDrop?"#d4edda":isDragging?"#f5f5f5":cc.bg,
        verticalAlign:"top",cursor:isLocked?"default":"pointer",
        outline:isDrop?"2px solid "+C.olive:"none",
        opacity:isDragging?0.4:1,transition:"background .1s"}}>
       {cell&&!isDragging&&(
        <div style={{color:cc.color,fontSize:10,lineHeight:1.3,pointerEvents:"none"}}>
         {showTime&&<div style={{fontSize:8,opacity:0.6,marginBottom:1}}>{cellTime}</div>}
         {cell.isTP&&<span style={{fontSize:7,background:"#92400e",color:"#fff",borderRadius:3,padding:"1px 3px",marginRight:2}}>TP</span>}
         {cell.splitGroup&&<span style={{fontSize:7,background:"#1d4ed8",color:"#fff",borderRadius:3,padding:"1px 3px",marginRight:2}}>{"SG-"+cell.splitGroup}</span>}
         {cell.isMerged&&<span style={{fontSize:7,background:C.olive,color:"#fff",borderRadius:3,padding:"1px 3px",marginRight:2}}>Regroup.</span>}
         {is2h&&<span style={{fontSize:7,background:"#6d28d9",color:"#fff",borderRadius:3,padding:"1px 3px",marginRight:2}}>2h</span>}
         <div style={{fontWeight:700}}>{(cc.label||"").length>20?(cc.label||"").slice(0,18)+"...":cc.label}</div>
         {(cc.teacher||(tcher&&tcher.name))&&<div style={{opacity:0.8,fontSize:9}}>{cc.teacher||(tcher&&tcher.name)}</div>}
         {cell.isReserved&&!cell.teacherId&&<div style={{opacity:.5,fontSize:9,fontStyle:"italic"}}>cliquer</div>}
        </div>
       )}
      </td>
     );
    })}
   </tr>
  );
 });
}






function WeekGrid({state,setState,cw,viewGroup,setViewGroup,onGenerate,pushUndo}){
 var SLOTS_BY_DAY=getSlotsFromState(state); var SLOTS_1H=SLOTS_BY_DAY[1]||SLOTS_BY_DAY[0];
 const groups=state.groups.filter(g=>(g.calendar||[]).some(w=>w.week===cw&&w.present));
 const schedule=state.schedules&&(state.schedules[cw]||state.schedules[String(cw)]);
 const _lw=state.lockedWeeks||{};
 const isLocked=!!((_lw[cw]||_lw[String(cw)])||(_lw[String(cw)+":"+(group&&group.id)]));
 const teachers=state.teachers;
 const etab=state.etab||DEFAULT_ETAB;
 const [drag,setDrag]=useState(null);
 const [editRes,setEditRes]=useState(null); // {di,si,cell} accueil/bilan // {source:"grid"|"bank", di, si, cell} or {source:"bank", idx}
 const [dropTarget,setDropTarget]=useState(null); // {di, si}

 if(!groups.length)return(
  <div style={{textAlign:"center",padding:40,color:C.mut}}>
   <div style={{fontSize:36,marginBottom:8}}>{"📅"}</div>
   <div>Aucun groupe present en S{cw}</div>
  </div>
 );

 const group=groups.find(g=>g.id===viewGroup)||groups[0];
 if(!group)return null;
 const gs=(schedule&&schedule[group.id])||{};
 const bank=state.bank||[];

 function cellColor(cell){
  if(!cell)return{bg:"#f0ede8",color:C.mut,label:"",teacher:null};
  if(cell.isReserved){
   const t2=cell.teacherId&&teachers.find(x=>x.id===cell.teacherId);
   return{
    bg:cell.subject==="Accueil"?"#e8f0fe":"#fff8e1",
    color:cell.subject==="Accueil"?"#1565c0":"#e65100",
    label:cell.subject,
    teacher:t2?t2.name.split(" ")[0]:null
   };
  }
  const col=sc(cell.subject);
  return{bg:col.bg,color:col.t,label:cell.subject,teacher:null};
 }

 function updateSchedule(newGs){
  // Sauvegarder l'etat courant avant modification (pour undo)
  if(pushUndo){
   var schedNow=state.schedules&&(state.schedules[String(cw)]||state.schedules[cw]);
   if(schedNow) pushUndo(JSON.parse(JSON.stringify(schedNow)));
  }
  setState(p=>{
   const sc2=Object.assign({},p.schedules||{});
   const wk=Object.assign({},sc2[String(cw)]||sc2[cw]||{});
   wk[group.id]=newGs;
   sc2[String(cw)]=wk;
   return Object.assign({},p,{schedules:sc2});
  });
 }

 function handleDragStart(e,di,si,cell){
  if(isLocked)return;
  e.dataTransfer.effectAllowed="move";
  setDrag({source:"grid",di,si,cell});
 }

 function handleBankDragStart(e,idx,cell){
  if(isLocked)return;
  e.dataTransfer.effectAllowed="move";
  setDrag({source:"bank",idx,cell});
 }

 function handleDragOver(e,di,si){
  e.preventDefault();
  e.dataTransfer.dropEffect="move";
  setDropTarget({di,si});
 }

 function handleDrop(e,di,si){
  e.preventDefault();
  setDropTarget(null);
  if(!drag)return;
  if(isLocked){toast("Planning verrouille.", "info");return;}

  const targetCell=gs[di]&&gs[di][si];
  const newGs=JSON.parse(JSON.stringify(gs));
  if(!newGs[di])newGs[di]={};

  if(drag.source==="grid"){
   const srcCell=drag.cell;
   const srcDi=drag.di, srcSi=drag.si;
   if(srcDi===di&&srcSi===si){setDrag(null);return;}

   if(targetCell&&!targetCell.isReserved){
    // Swap : la cellule cible va dans la banque, la source vient ici
    newGs[di][si]=Object.assign({},srcCell);
    // Mettre la cellule source dans la banque
    newGs[srcDi]=newGs[srcDi]||{};
    delete newGs[srcDi][srcSi];
    setState(p=>{
     const bk=[...((p.bank)||[]),{cell:targetCell,groupId:group.id,cw:String(cw)}];
     return Object.assign({},p,{bank:bk});
    });
   } else {
    // Deplacer vers case vide
    newGs[di][si]=Object.assign({},srcCell);
    newGs[srcDi]=newGs[srcDi]||{};
    delete newGs[srcDi][srcSi];
   }
  } else {
   // Depuis la banque
   const srcCell=drag.cell;
   const srcIdx=drag.idx;
   if(targetCell&&!targetCell.isReserved){
    // Swap avec banque
    newGs[di][si]=Object.assign({},srcCell);
    setState(p=>{
     const bk=[...((p.bank)||[])];
     bk[srcIdx]={cell:targetCell,groupId:group.id,cw:String(cw)};
     return Object.assign({},p,{bank:bk});
    });
   } else {
    newGs[di][si]=Object.assign({},srcCell);
    setState(p=>{
     const bk=[...((p.bank)||[])];
     bk.splice(srcIdx,1);
     return Object.assign({},p,{bank:bk});
    });
   }
  }
  updateSchedule(newGs);
  setDrag(null);
 }

 function handleDropOnBank(e){
  e.preventDefault();
  setDropTarget(null);
  if(!drag||drag.source!=="grid")return;
  if(isLocked){toast("Planning verrouille.", "info");return;}
  const newGs=JSON.parse(JSON.stringify(gs));
  newGs[drag.di]=newGs[drag.di]||{};
  delete newGs[drag.di][drag.si];
  updateSchedule(newGs);
  setState(p=>{
   const bk=[...((p.bank)||[]),{cell:drag.cell,groupId:group.id,cw:String(cw)}];
   return Object.assign({},p,{bank:bk});
  });
  setDrag(null);
 }

 function removeBankItem(idx){
  setState(p=>{
   const bk=[...((p.bank)||[])];
   bk.splice(idx,1);
   return Object.assign({},p,{bank:bk});
  });
 }

 // Filtrer banque : seulement items du groupe+semaine courants
 const bankItems=bank.filter(b=>b.groupId===group.id&&String(b.cw)===String(cw));

 if(!schedule)return(
  <div style={{textAlign:"center",padding:40,color:C.mut}}>
   <div style={{fontSize:36,marginBottom:8}}>{"📅"}</div>
   <div style={{marginBottom:16}}>Planning non genere pour S{cw}</div>
   <Btn v="success" onClick={onGenerate}>Generer S{cw}</Btn>
  </div>
 );


 // Pre-calculer continuations 2h
 var iContWG={};
 (function(){
  var sbdWG=getSlotsFromState(state);
  DAYS.forEach(function(_,di){

     if(!iContWG[di])iContWG[di]={};

        <div style={{fontWeight:700}}>{(b.cell.subject||"").length>14?(b.cell.subject||"").slice(0,13)+"...":(b.cell.subject||"")}</div>
       {t&&<div style={{opacity:.8}}>{t.name.split(" ")[0]}</div>}

    {editRes&&(

function TPBtn({selWeek,matKey,pfSem,selGroup,setState,C,F}){
 const istp=!!(pfSem.isTP&&pfSem.isTP[matKey]);
 function toggle(){
  setState(function(p){
   const npf=Object.assign({},p.planFormation||{});
   const ng=Object.assign({},npf[selGroup]||{semaines:{}});
   const ns=Object.assign({},ng.semaines[selWeek]||{});
   ns.isTP=Object.assign({},ns.isTP||{},{[matKey]:!istp});
   if(!istp){
    ns.heures=Object.assign({},ns.heures||{});
    if(!(ns.heures[matKey]>=2)) ns.heures[matKey]=2;
   }
   ng.semaines=Object.assign({},ng.semaines,{[selWeek]:ns});
   npf[selGroup]=ng;
   return Object.assign({},p,{planFormation:npf});
  });
 }
 return(
  <button onClick={toggle} title="Travaux Pratiques : bloc de 2h consecutives"
   style={{padding:"2px 6px",borderRadius:5,cursor:"pointer",fontFamily:F,fontSize:9,
   border:"1px solid "+(istp?C.brun:C.bord),
   background:istp?"#f5ede0":"#fff",
   color:istp?C.brun:C.mut,fontWeight:istp?700:400}}>
   {istp?"TP":"TP?"}
  </button>
 );
}

function PlanFormationPanel({state,setState,currentTeacher,cw,setCw,onGenerateWeek}){
 const [selGroup,setSelGroup]=useState((state.groups[0]&&state.groups[0].id)||"");
 const [selTeacher,setSelTeacher]=useState((currentTeacher&&currentTeacher.id)||"");
 const [viewMode,setViewMode]=useState("weekly");
 const [selModule,setSelModule]=useState("");
 const [selWeek,setSelWeek]=useState(cw||getCurrentWeek());
 useEffect(function(){if(setCw&&selWeek!==cw)setCw(selWeek);},[selWeek]);

 const group=state.groups.find(g=>g.id===selGroup);
 const pfGroup=((state.planFormation||{})[selGroup])||{semaines:{}};
 const semaines=(group&&group.calendar||[]).filter(w=>w.present)
  .sort((a,b)=>(a.week<30?a.week+52:a.week)-(b.week<30?b.week+52:b.week));
 const matieres=state.matrix
  .filter(m=>m.groupId===selGroup&&!m.isMGReceiver&&(m.hoursAnnual||0)>0)
  .map(m=>{const t=state.teachers.find(x=>x.id===m.teacherId);return{...m,teacherName:(t&&t.name)||"?"};})
  .sort((a,b)=>b.hoursAnnual-a.hoursAnnual);
 const visibleMatieres=currentTeacher
  ?matieres.filter(m=>m.teacherId===currentTeacher.id)
  :selTeacher?matieres.filter(m=>m.teacherId===selTeacher):matieres;

 function matKey(m){return m.subject+"|||"+m.teacherId;}
 function getTarget(m){return m.hoursAnnual||0;}
 function getTotal(key){
  const sem=pfGroup.semaines||{};
  return Math.round(Object.values(sem).reduce((s,w)=>s+((w.heures&&w.heures[key])||0),0)*10)/10;
 }
 function getTotalR(key){
  const sem=pfGroup.semaines||{};
  let total=0;
  Object.entries(sem).forEach(([wn,w])=>{
   total+=(w.heuresRealisees&&w.heuresRealisees[key])||0;
  });
  return Math.round(total*10)/10;
 }
 function updH(wn,key,val){
  setState(p=>{
   const npf={...(p.planFormation||{})};
   const ng={...(npf[selGroup]||{semaines:{}})};
   const ns={...(ng.semaines[wn]||{})};

 function updMerge(wn,key,field,val){

function MatrixEditor({state,setState}){
 const [selGroup,setSelGroup]=useState((state.groups[0]&&state.groups[0].id)||"");
 const rows=state.matrix.filter(m=>m.groupId===selGroup&&!m.isMGReceiver);

 function addRow(){
  const t=state.teachers[0];
  if(!t)return;
  setState(p=>({...p,matrix:[...p.matrix,{id:uid(),groupId:selGroup,teacherId:t.id,
   subject:"Nouvelle matiere",hoursAnnual:20,courseType:"MP",constraint:"",split:false}]}));
 }

 function updRow(id,field,val){
  setState(p=>({...p,matrix:p.matrix.map(m=>
   m.id===id?{...m,[field]:field==="hoursAnnual"?parseFloat(val)||0:val}:m
  )}));
 }

 function delRow(id){
  setState(p=>({...p,matrix:p.matrix.filter(m=>m.id!==id&&m.splitOf!==id)}));
 }

 function addSplit(m){
  // Cree une paire de dedoublement : sous-groupe A (modifie m) + sous-groupe B (nouvelle ligne)
  const pairId=uid();
  const idB=uid();
  const t2=state.teachers[1]||state.teachers[0];
  setState(p=>({...p,matrix:p.matrix.map(function(r){
   if(r.id!==m.id) return r;
   return {...r,splitGroup:"A",splitPairId:pairId,subject:r.subject+" [A]"};
  }).concat([{
   id:idB,groupId:m.groupId,teacherId:t2.id,
   subject:m.subject+" [B]",
   hoursAnnual:m.hoursAnnual,courseType:m.courseType||"MP",
   constraint:m.constraint||"",
   splitGroup:"B",splitPairId:pairId,splitOf:m.id
  }])}));
 }

 function removeSplit(m){
  // Retire le dedoublement : supprime B et nettoie A
  const pairId=m.splitPairId||m.splitOf;
  setState(p=>({...p,matrix:p.matrix.filter(function(r){
   if(r.splitPairId===pairId&&r.splitGroup==="B") return false;
   return true;
  }).map(function(r){
   if(r.id===m.id){
    const {splitGroup,splitPairId,...rest}=r;
    return {...rest,subject:r.subject.replace(" [A]","").replace(" [B]","")};
   }
   return r;
  })}));
 }

 const isSplit=function(m){return !!(m.splitGroup);};

 return(
  <div>
   <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
    <Sel value={selGroup} onChange={e=>setSelGroup(e.target.value)} style={{minWidth:120}}>
     {state.groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
    </Sel>
    <Btn sm onClick={addRow}>+ Ajouter</Btn>
    <span style={{color:C.mut,fontSize:11}}>{rows.length} ligne(s)</span>
   </div>
   <div style={{fontSize:11,color:C.mut,marginBottom:8}}>
    Le dedoublement permet de placer 2 cours simultanement : pendant que le sous-groupe A suit la matiere A, le sous-groupe B suit la matiere B au meme creneau.
   </div>
   <div style={{overflowX:"auto"}}>
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}><table style={{borderCollapse:"collapse",width:"100%",fontSize:11,fontFamily:F,minWidth:400}}>
     <thead><tr>
      <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"left",fontSize:10,minWidth:140}}>Matiere</th>
      <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"left",fontSize:10}}>Formateur</th>
      <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",fontSize:10,width:55}}>H.Ann.</th>
      <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",fontSize:10,width:50}}>Matin</th>
      <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",fontSize:10,width:60}}>Creneaux</th>
      <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",fontSize:10,width:30}}></th>
     </tr></thead>
     <tbody>
      {rows.map((m,i)=>{
       const split=isSplit(m);
       const isB=m.splitGroup==="B";
       const rowBg=isB?"#f0f7ff":i%2===0?"#fff":C.creme;
       return(
        <tr key={m.id} style={{background:rowBg,borderLeft:isB?"3px solid #3b82f6":split?"3px solid "+C.olive:"3px solid transparent"}}>
         <td style={{padding:"3px 6px",borderRight:"1px solid "+C.bord}}>
          <input type="text" value={m.subject} onChange={e=>updRow(m.id,"subject",e.target.value)}
           style={{width:"100%",border:"none",background:"transparent",fontFamily:F,fontSize:11,color:C.txt,outline:"none"}}/>
          {split&&<div style={{fontSize:8,color:isB?"#3b82f6":C.olive,fontWeight:700}}>
           {"Sous-groupe "+m.splitGroup}
          </div>}
         </td>
         <td style={{padding:"3px 6px",borderRight:"1px solid "+C.bord}}>
          <Sel value={m.teacherId} onChange={e=>updRow(m.id,"teacherId",e.target.value)} style={{width:"100%",border:"none",background:"transparent",padding:"2px"}}>
           {state.teachers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </Sel>
         </td>
         <td style={{padding:"3px",borderRight:"1px solid "+C.bord,textAlign:"center"}}>
          <input type="number" value={m.hoursAnnual} onChange={e=>updRow(m.id,"hoursAnnual",e.target.value)}
           style={{width:50,textAlign:"center",border:"none",background:"transparent",fontFamily:F,fontSize:11}}/>
         </td>
         <td style={{padding:"3px",borderRight:"1px solid "+C.bord,textAlign:"center"}}>
          <input type="checkbox" checked={m.constraint==="morning"}
           onChange={e=>updRow(m.id,"constraint",e.target.checked?"morning":"")}
           title="Privilegier le matin" style={{cursor:"pointer",accentColor:C.olive,width:14,height:14}}/>
         </td>
         <td style={{padding:"3px",borderRight:"1px solid "+C.bord,textAlign:"center"}}>
          <select value={m.slotSize||1} onChange={e=>updRow(m.id,"slotSize",parseInt(e.target.value))}
           style={{fontSize:9,padding:"1px 2px",border:"none",background:"transparent",cursor:"pointer"}}>
           <option value={1}>1h</option>
           <option value={2}>2h</option>
          </select>
         </td>
         <td style={{padding:"3px",textAlign:"center"}}>
          <button onClick={()=>delRow(m.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:2}}>x</button>
         </td>
        </tr>
       );
      })}
     </tbody>
    </table>
   </div>
  </div>
  </div>
 );
}

function RecapPanel({state,setState,filterTeacher}){
 const [selGroup,setSelGroup]=useState((state.groups[0]&&state.groups[0].id)||"");
 const group=state.groups.find(g=>g.id===selGroup);
 const pfGroup=((state.planFormation||{})[selGroup])||{semaines:{}};
 const semaines=(group&&group.calendar||[]).filter(w=>w.present)
  .sort((a,b)=>(a.week<30?a.week+52:a.week)-(b.week<30?b.week+52:b.week));
 const matieres=state.matrix
  .filter(m=>m.groupId===selGroup&&!m.isMGReceiver&&(m.hoursAnnual||0)>0&&(!filterTeacher||m.teacherId===filterTeacher))
  .map(m=>{const t=state.teachers.find(x=>x.id===m.teacherId);return{...m,teacherName:(t&&t.name)||"?"};})
  .sort((a,b)=>b.hoursAnnual-a.hoursAnnual);

 // Helpers mise a jour planFormation
 function updField(wn,field,val){
  setState(p=>{
   const npf=Object.assign({},p.planFormation||{});
   const ng=Object.assign({},npf[selGroup]||{semaines:{}});
   const ns=Object.assign({},ng.semaines[wn]||{});
   ns[field]=val;
   ng.semaines=Object.assign({},ng.semaines,{[wn]:ns});
   npf[selGroup]=ng;
   return Object.assign({},p,{planFormation:npf});
  });
 }
 function updH(wn,key,val){
  setState(p=>{
   const npf=Object.assign({},p.planFormation||{});
   const ng=Object.assign({},npf[selGroup]||{semaines:{}});
   const ns=Object.assign({},ng.semaines[wn]||{});
   ns.heures=Object.assign({},ns.heures||{},{[key]:parseFloat(val)||0});
   ng.semaines=Object.assign({},ng.semaines,{[wn]:ns});
   npf[selGroup]=ng;
   return Object.assign({},p,{planFormation:npf});
  });
 }
 function updCont(wn,key,val){
  setState(p=>{
   const npf=Object.assign({},p.planFormation||{});
   const ng=Object.assign({},npf[selGroup]||{semaines:{}});
   const ns=Object.assign({},ng.semaines[wn]||{});
   ns.contenus=Object.assign({},ns.contenus||{},{[key]:val});
   ng.semaines=Object.assign({},ng.semaines,{[wn]:ns});
   npf[selGroup]=ng;
   return Object.assign({},p,{planFormation:npf});
  });
 }

 // EPI pour ce groupe
 const epiGroups=["4eme","3eme A","3eme B"];
 const isEpiGroup=group&&epiGroups.indexOf(group.name)>=0;
 const epiPlan=(state.epiPlanning&&state.epiPlanning[selGroup])||{};

 function getCell(wn,key){
  const sem=(pfGroup.semaines||{})[wn]||{};
  const h=(sem.heures&&sem.heures[key])||0;
  const r=(sem.heuresRealisees&&sem.heuresRealisees[key])||0;
  const cont=((sem.contenus)||{})[key]||"";
  return{h,r,cont};
 }

 if(!matieres.length)return(
  <div style={{textAlign:"center",padding:40,color:C.mut}}>
   Chargez un JSON et configurez la matrice pour voir le tableau.
  </div>
 );

 const thStyle={background:C.brun,color:"#fff",padding:"5px 6px",
  textAlign:"center",minWidth:90,fontSize:9,fontWeight:600,verticalAlign:"middle"};
 const stickyL0={position:"sticky",left:0,zIndex:2};
 const stickyL1={position:"sticky",left:140,zIndex:2};

 return(
  <div>
   <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
    <Sel value={selGroup} onChange={e=>setSelGroup(e.target.value)} style={{minWidth:120}}>
     {state.groups.filter(g=>state.matrix.some(m=>m.groupId===g.id&&!m.isMGReceiver)).map(g=>(
      <option key={g.id} value={g.id}>{g.name}</option>
     ))}
    </Sel>
    <span style={{fontSize:11,color:C.mut}}>{matieres.length} modules - {semaines.length} semaines</span>
   </div>
   <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"75vh",border:"1px solid "+C.bord,borderRadius:8}}>
    <table style={{borderCollapse:"collapse",fontFamily:F,fontSize:10}}>
     <thead>
      <tr>
       <th style={{...thStyle,...stickyL0,minWidth:140,textAlign:"left",padding:"5px 8px"}}>Module</th>
       <th style={{...thStyle,...stickyL1,width:45}}>Total</th>
       {semaines.map(sem=>(
        <th key={sem.week} style={{...thStyle,minWidth:90}}>
         {getWeekLabel(sem.week).split(" ").slice(1).join(" ")}
         <div style={{fontWeight:400,opacity:.8,fontSize:8}}>S{sem.week}</div>
        </th>
       ))}
      </tr>
     </thead>
     <tbody>

      {/* LIGNE THEME DE LA SEMAINE */}
      <tr style={{background:"#fffde7"}}>
       <td style={{...stickyL0,background:"#fffde7",padding:"4px 8px",borderRight:"1px solid "+C.bord,
        fontWeight:700,color:C.ocre,fontSize:11}}>
        Theme de la semaine
       </td>
       <td style={{...stickyL1,background:"#fffde7",padding:"3px",borderRight:"2px solid "+C.bord,textAlign:"center",color:C.mut,fontSize:9}}>
        -
       </td>
       {semaines.map(sem=>{
        const wn=sem.week;
        const val=((pfGroup.semaines||{})[wn]||{}).theme||"";
        return(
         <td key={wn} style={{padding:"3px",borderRight:"1px solid "+C.bord,borderBottom:"2px solid "+C.ocre}}>
          <input type="text" value={val} onChange={e=>updField(wn,"theme",e.target.value)}
           placeholder="Theme..."
           style={{width:"100%",border:"none",background:"transparent",fontFamily:F,
           fontSize:9,color:C.txt,outline:"none",minWidth:80}}/>
         </td>
        );
       })}
      </tr>

      {/* -- LIGNE EPI -- */}
      {isEpiGroup&&(
       <tr style={{background:"#f1f8e9"}}>
        <td style={{...stickyL0,background:"#f1f8e9",padding:"4px 8px",borderRight:"1px solid "+C.bord,
         fontWeight:700,color:C.olive,fontSize:11}}>
         EPI
        </td>
        <td style={{...stickyL1,background:"#f1f8e9",padding:"3px",borderRight:"2px solid "+C.bord,textAlign:"center",color:C.mut,fontSize:9}}>
         -
        </td>
        {semaines.map(sem=>{
         const wn=sem.week;
         const epiWk=(epiPlan[wn])||{};
         const t1=state.teachers.find(t=>t.id===epiWk.t1);
         const t2=state.teachers.find(t=>t.id===epiWk.t2);
         const theme=epiWk.theme||"";
         const h=epiWk.heures||"";
         return(
          <td key={wn} style={{padding:"3px 4px",borderRight:"1px solid "+C.bord,
           borderBottom:"2px solid "+C.olive,verticalAlign:"top",background:epiWk.t1?"#e8f5e9":"#f1f8e9",minWidth:90}}>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
           <Sel value={epiWk.t1||""} onChange={e=>{
            setState(p=>{const ep=Object.assign({},p.epiPlanning||{});ep[selGroup]=Object.assign({},ep[selGroup]||{});ep[selGroup][wn]=Object.assign({},ep[selGroup][wn]||{t1:"",t2:"",heures:6,theme:""},{t1:e.target.value});return Object.assign({},p,{epiPlanning:ep});});
           }} style={{fontSize:8,padding:"1px 2px",border:"1px solid "+C.bord,borderRadius:3,width:"100%"}}>
            <option value="">F1 --</option>
            {state.teachers.map(t=><option key={t.id} value={t.id}>{t.name.split(" ")[0]}</option>)}
           </Sel>
           <Sel value={epiWk.t2||""} onChange={e=>{
            setState(p=>{const ep=Object.assign({},p.epiPlanning||{});ep[selGroup]=Object.assign({},ep[selGroup]||{});ep[selGroup][wn]=Object.assign({},ep[selGroup][wn]||{t1:"",t2:"",heures:6,theme:""},{t2:e.target.value});return Object.assign({},p,{epiPlanning:ep});});
           }} style={{fontSize:8,padding:"1px 2px",border:"1px solid "+C.bord,borderRadius:3,width:"100%"}}>
            <option value="">F2 --</option>
            {state.teachers.map(t=><option key={t.id} value={t.id}>{t.name.split(" ")[0]}</option>)}
           </Sel>
           <input type="number" min={1} max={14} step={0.5} value={epiWk.heures||""} placeholder="h"
            onChange={e=>{
             setState(p=>{const ep=Object.assign({},p.epiPlanning||{});ep[selGroup]=Object.assign({},ep[selGroup]||{});ep[selGroup][wn]=Object.assign({},ep[selGroup][wn]||{t1:"",t2:"",heures:6,theme:""},{heures:parseFloat(e.target.value)||6});return Object.assign({},p,{epiPlanning:ep});});
            }}
            style={{width:"100%",border:"1px solid "+C.bord,borderRadius:3,padding:"1px 3px",fontFamily:F,fontSize:8,textAlign:"center"}}/>
           <input type="text" value={epiWk.theme||""} placeholder="Theme..."
            onChange={e=>{
             setState(p=>{const ep=Object.assign({},p.epiPlanning||{});ep[selGroup]=Object.assign({},ep[selGroup]||{});ep[selGroup][wn]=Object.assign({},ep[selGroup][wn]||{t1:"",t2:"",heures:6,theme:""},{theme:e.target.value});return Object.assign({},p,{epiPlanning:ep});});
            }}
            style={{width:"100%",border:"none",background:"transparent",fontFamily:F,fontSize:8,color:C.dim,outline:"none"}}/>
          </div>
         </td>
         );
        })}
       </tr>
      )}

      {/* -- LIGNES MODULES -- */}
      {matieres.map((m,mi)=>{
       const key=m.subject+"|||"+m.teacherId;
       const target=m.hoursAnnual||0;
       const totalH=semaines.reduce((s,sem)=>s+(getCell(sem.week,key).h||0),0);
       const totalR=semaines.reduce((s,sem)=>s+(getCell(sem.week,key).r||0),0);
       const isEven=mi%2===0;
       const rowBg=isEven?"#fff":C.creme;
       return(
        <tr key={mi}>
         <td style={{...stickyL0,background:rowBg,padding:"4px 8px",
          borderRight:"1px solid "+C.bord,borderBottom:"1px solid "+C.bord}}>
          <div style={{fontWeight:700,color:C.txt,fontSize:10}}>{m.subject.length>20?m.subject.slice(0,19)+"...":m.subject}</div>
          <div style={{fontSize:9,color:C.dim}}>{m.teacherName.split(" ")[0]}</div>
         </td>
         <td style={{...stickyL1,background:rowBg,padding:"3px 4px",textAlign:"center",
          borderRight:"2px solid "+C.bord,borderBottom:"1px solid "+C.bord}}>
          <div style={{color:totalH>target?C.red:totalH>0?C.olive:C.mut,fontWeight:700,fontSize:10}}>
           {totalH||0}h{totalH>target&&" !"}
          </div>
          <div style={{fontSize:8,color:C.mut}}>/{target}h</div>
          {target>0&&<div style={{background:C.creme,borderRadius:2,height:3,overflow:"hidden",margin:"2px 0"}}>
           <div style={{width:Math.min(100,Math.round((totalH/target)*100))+"%",
            background:totalH>target?C.red:totalH>=target?C.olive:C.ocre,height:"100%"}}/>
          </div>}
          {totalR>0&&<div style={{fontSize:8,color:C.brun}}>{totalR}h R</div>}
         </td>
         {semaines.map(sem=>{
          const wn=sem.week;
          const {h,r,cont}=getCell(wn,key);
          const cellBg=r>0?"#edf4e0":h>0?C.accD:rowBg;
          return(
           <td key={wn} style={{padding:"2px 3px",borderRight:"1px solid "+C.bord,
            borderBottom:"1px solid "+C.bord,background:cellBg,verticalAlign:"top",minWidth:90}}>
            <div style={{display:"flex",gap:2,marginBottom:2,alignItems:"center"}}>
             <input type="number" min={0} max={target} step={0.5} value={h||""}
              onChange={e=>{
               const val=parseFloat(e.target.value)||0;
               if(val>target){toast("Depassement: max "+target+"h pour ce module.", "error");return;}
               updH(wn,key,e.target.value);
              }}
              placeholder="0"
              style={{width:30,border:"none",background:"transparent",fontFamily:F,
              fontSize:9,color:totalH>target?C.red:C.olive,fontWeight:700,outline:"none",textAlign:"center"}}/>
             {r>0&&<span style={{color:C.brun,fontSize:9,fontWeight:600}}>/{r}R</span>}
            </div>
            <input type="text" value={cont}
             onChange={e=>updCont(wn,key,e.target.value)}
             placeholder="Contenu..."
             style={{width:"100%",border:"none",background:"transparent",fontFamily:F,
             fontSize:8,color:C.dim,outline:"none",lineHeight:1.3}}/>
           </td>
          );
         })}
        </tr>
       );
      })}
     </tbody>
    </table>
   </div>
  </div>
 );
}

function PDay({style,children,...props}){
 return <td style={style} {...props}>{children}</td>;
}

function EquipePanel({state,setState}){
 var isMobile=useIsMobile();
 const [editId,setEditId]=useState(null);
 const [form,setForm]=useState({name:"",pin:"0000",maxH:3,txPeda:100,presence:{0:"full",1:"full",2:"full",3:"full",4:"full"}});
 const [showPin,setShowPin]=useState({});
 const [view,setView]=useState("liste"); // "liste" | "synthese"
 const DAYS_S=["Lun","Mar","Mer","Jeu","Ven"];
 const PRES_VALS=["absent","am","pm","full"];
 const PRES_LABELS={"absent":"Absent","am":"Matin","pm":"Aprem","full":"Complet"};
 const PRES_COLORS={"absent":C.creme,"am":"#dbeafe","pm":"#fed7aa","full":C.accD};
 const PRES_TEXT={"absent":C.mut,"am":"#1d4ed8","pm":"#c2410c","full":C.olive};

 function cyclePresence(di){
  setForm(function(f){
   var cur=f.presence[di]||"full";
   var idx=PRES_VALS.indexOf(cur);
   var next=PRES_VALS[(idx+1)%PRES_VALS.length];
   return Object.assign({},f,{presence:Object.assign({},f.presence,{[di]:next})});
  });
 }
 function calcWeekCap(presence,txPeda){
  var half=0;
  [0,1,2,3,4].forEach(function(di){
   var p=presence[di]||"full";
   if(p==="full") half+=2; else if(p==="am"||p==="pm") half+=1;
  });
  var tx=(txPeda!=null?txPeda:100)/100;
  return Math.round((half/10)*20*tx*10)/10;
 }
 function startEdit(t){
  setEditId(t.id);
  var pres=t.presence||{0:"full",1:"full",2:"full",3:"full",4:"full"};
  setForm({name:t.name,pin:t.pin||"0000",maxH:t.maxHoursPerDay||3,txPeda:t.txPeda!=null?t.txPeda:100,presence:pres});
 }
 function cancelEdit(){setEditId(null);}
 function toPDObj(presence){
  var r={};[0,1,2,3,4].forEach(function(di){r[di]=presence[di]||"full";});return r;
 }
 function saveEdit(){
  if(!form.name.trim()){toast("Nom requis", "error");return;}
  if(!/^[0-9]{4}$/.test(form.pin)){toast("PIN = 4 chiffres", "error");return;}
  var pd=toPDObj(form.presence);
  setState(function(p){
   var pds=Object.assign({},p.presenceDays||{},{[editId]:pd});
   return Object.assign({},p,{presenceDays:pds,
    teachers:p.teachers.map(function(t){
     return t.id===editId?Object.assign({},t,{name:form.name.trim(),pin:form.pin,maxHoursPerDay:form.maxH,presence:form.presence}):t;
    })});
  });
  cancelEdit();
 }
 function addTeacher(){
  if(!form.name.trim()){toast("Nom requis", "error");return;}
  if(!/^[0-9]{4}$/.test(form.pin)){toast("PIN = 4 chiffres", "error");return;}
  var id="t_"+uid();
  var pd=toPDObj(form.presence);
  var newT={id,name:form.name.trim(),pin:form.pin,maxHoursPerDay:form.maxH,txPeda:form.txPeda,presence:form.presence,presenceDays:pd,partialDays:[]};
  setState(function(p){
   var pds=Object.assign({},p.presenceDays||{},{[id]:pd});
   return Object.assign({},p,{teachers:[...p.teachers,newT],presenceDays:pds});
  });
  setForm({name:"",pin:"0000",maxH:3,txPeda:100,presence:{0:"full",1:"full",2:"full",3:"full",4:"full"}});
 }
 function delTeacher(id){
  if(state.matrix.some(function(m){return m.teacherId===id;})){alert("Formateur dans la matrice");return;}
  setState(function(p){return Object.assign({},p,{teachers:p.teachers.filter(function(t){return t.id!==id;})});});
 }
 function genPin(){setForm(function(f){return Object.assign({},f,{pin:String(Math.floor(1000+Math.random()*9000))});});}

 const editing=editId!==null;
 const weekCap=calcWeekCap(form.presence);

 // Synthese heures : toutes les semaines presentes
 var allWeeks=[];
 state.groups.forEach(function(g){
  (g.calendar||[]).forEach(function(w){
   if(w.present&&!allWeeks.includes(w.week)) allWeeks.push(w.week);
  });
 });
 allWeeks.sort(function(a,b){return (a<30?a+52:a)-(b<30?b+52:b);});

 return(
  <div style={{maxWidth:900}}>
   <div style={{fontFamily:FS,fontSize:16,fontWeight:700,color:C.brun,marginBottom:12}}>Equipe et PIN</div>

   {/* Onglets */}
   <div style={{display:"flex",gap:6,marginBottom:14}}>
    {[{id:"liste",l:"Liste et parametres"},{id:"synthese",l:"Synthese des heures"}].map(function(t){return(
     <button key={t.id} onClick={function(){setView(t.id);}}
      style={{padding:"6px 16px",borderRadius:8,cursor:"pointer",fontFamily:F,fontSize:12,
      border:"1px solid "+(view===t.id?C.brun:C.bord),
      background:view===t.id?C.brun:"#fff",
      color:view===t.id?"#fff":C.txt,fontWeight:view===t.id?700:400}}>
      {isMobile?(t.short||t.l.slice(0,6)):t.l}
     </button>
    );})}
   </div>

   {/* -- VUE LISTE -- */}
   {view==="liste"&&(
    <div>
     {/* Formulaire */}
     <div style={{background:C.card,border:"1px solid "+C.bord,borderRadius:10,padding:14,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,color:C.txt,marginBottom:12}}>
       {editing?"Modifier":"Ajouter un formateur"}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 90px",gap:8,marginBottom:12}}>
       <div>
        <div style={{fontSize:10,color:C.mut,marginBottom:3}}>Nom</div>
        <Inp value={form.name} onChange={function(e){setForm(function(f){return Object.assign({},f,{name:e.target.value});});}} placeholder="Nom Prenom"/>
       </div>
       <div>
        <div style={{fontSize:10,color:C.mut,marginBottom:3}}>PIN</div>
        <div style={{display:"flex",gap:3}}>
         <input type="text" maxLength={4} value={form.pin}
          onChange={function(e){if(/^[0-9]{0,4}$/.test(e.target.value))setForm(function(f){return Object.assign({},f,{pin:e.target.value});});}}
          style={{width:50,border:"1px solid "+C.bord,borderRadius:6,padding:"5px 3px",fontFamily:F,fontSize:13,textAlign:"center",letterSpacing:3,fontWeight:700}}/>
         <button onClick={genPin} style={{border:"1px solid "+C.bord,borderRadius:6,padding:"4px 6px",background:"#fff",cursor:"pointer",fontSize:10}}>?</button>
        </div>
       </div>
      </div>
      {/* Taux pedagogique */}
      <div style={{marginBottom:10}}>
       <div style={{fontSize:10,color:C.mut,marginBottom:4}}>
        Taux d enseignement (% du temps de presence consacre a la pedagogie)
       </div>
       <div style={{display:"flex",alignItems:"center",gap:8}}>
        <input type="range" min={10} max={100} step={5} value={form.txPeda}
         onChange={function(e){setForm(function(f){return Object.assign({},f,{txPeda:parseInt(e.target.value)});});}}
         style={{flex:1,accentColor:C.brun}}/>
        <span style={{fontWeight:700,color:C.brun,minWidth:36,fontSize:13}}>{form.txPeda}%</span>
       </div>
      </div>
      {/* Presence */}
      <div style={{marginBottom:10}}>
       <div style={{fontSize:10,color:C.mut,marginBottom:4}}>
        Presence (cliquer pour changer) - Cap semaine : <strong>{weekCap}h</strong> ({form.txPeda<100?"taux peda "+form.txPeda+"%":"norme 20h temps plein"})
       </div>
       <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {DAYS_S.map(function(d,di){
         var p=form.presence[di]||"full";
         return(
          <div key={di} style={{textAlign:"center"}}>
           <div style={{fontSize:9,color:C.mut,marginBottom:2}}>{d}</div>
           <button onClick={function(){cyclePresence(di);}}
            style={{padding:"5px 6px",borderRadius:6,border:"1px solid "+PRES_COLORS[p],
            background:PRES_COLORS[p],color:PRES_TEXT[p],
            fontFamily:F,fontSize:9,fontWeight:700,cursor:"pointer",minWidth:52}}>
            {PRES_LABELS[p]}
           </button>
          </div>
         );
        })}
       </div>
      </div>
      <div style={{display:"flex",gap:6}}>
       {editing?(
        <span style={{display:"flex",gap:6}}>
         <Btn onClick={saveEdit}>Enregistrer</Btn>
         <Btn v="ghost" onClick={cancelEdit}>Annuler</Btn>
        </span>
       ):<Btn onClick={addTeacher}>Ajouter</Btn>}
      </div>
     </div>

     {/* Liste formateurs */}
     <div style={{background:C.surf,border:"1px solid "+C.bord,borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 50px 60px 210px 70px",
       background:C.brun,color:"#fff",padding:"6px 12px",fontSize:10,fontWeight:700,gap:4}}>
       <span>Formateur</span>
       <span style={{textAlign:"center"}}>PIN</span>
       <span style={{textAlign:"center"}}>Cap/sem</span>
       <span style={{textAlign:"center"}}>Presence</span>
       <span></span>
      </div>
      {state.teachers.length===0&&<div style={{padding:20,textAlign:"center",color:C.mut,fontSize:12}}>Aucun formateur</div>}
      {state.teachers.map(function(t,i){
       var pres=t.presence||{0:"full",1:"full",2:"full",3:"full",4:"full"};
       var cap=calcWeekCap(pres,t.txPeda);
       var pinV=showPin[t.id];
       return(
        <div key={t.id} style={{display:"grid",gridTemplateColumns:"1fr 50px 60px 210px 70px",
         padding:"8px 12px",borderTop:i>0?"1px solid "+C.bord:"none",
         background:editId===t.id?C.accD:"transparent",alignItems:"center",gap:4}}>
         <div style={{fontWeight:600,color:C.txt,fontSize:12}}>{t.name}</div>
         <div style={{textAlign:"center",cursor:"pointer"}}
          onClick={function(){setShowPin(function(p){return Object.assign({},p,{[t.id]:!p[t.id]});});}}>
          <span style={{fontFamily:"monospace",fontSize:11,color:pinV?C.brun:C.bord}}>
           {pinV?(t.pin||"0000"):"••••"}
          </span>
         </div>
         <div style={{textAlign:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.olive}}>{cap}h</span>
          <span style={{fontSize:9,color:C.mut}}>/sem</span>
          <div style={{fontSize:8,color:C.mut}}>{t.txPeda!=null&&t.txPeda<100?t.txPeda+"%":""}</div>
         </div>
         <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
          {[0,1,2,3,4].map(function(di){
           var p=pres[di]||"full";
           return <span key={di} style={{padding:"2px 4px",borderRadius:4,background:PRES_COLORS[p],
            color:PRES_TEXT[p],fontSize:8,fontWeight:700}}>{DAYS_S[di]}<br/>{PRES_LABELS[p].slice(0,3)}</span>;
          })}
         </div>
         <div style={{display:"flex",gap:3,justifyContent:"flex-end"}}>
          <button onClick={function(){startEdit(t);}} style={{border:"1px solid "+C.bord,borderRadius:5,padding:"2px 6px",background:"#fff",cursor:"pointer",fontSize:10,color:C.dim}}>Edit</button>
          <button onClick={function(){delTeacher(t.id);}} style={{border:"1px solid "+C.red,borderRadius:5,padding:"2px 6px",background:"#fff",cursor:"pointer",fontSize:10,color:C.red}}>x</button>
         </div>
        </div>
       );
      })}
   )}

   {/* -- VUE SYNTHESE -- */}
   {view==="synthese"&&(
    <div>
     <div style={{fontSize:11,color:C.mut,marginBottom:10}}>
      Heures prevues depuis le plan de formation. <strong>Norme : 20h/sem</strong> pour un temps plein. Vert = dans la norme, orange = exceptionnel (jusqu a 23h), rouge = depassement.
     </div>
     <div style={{overflowX:"auto"}}>
      <table style={{borderCollapse:"collapse",fontFamily:F,fontSize:10,minWidth:600}}>
       <thead>
        <tr>
         <th style={{background:C.brun,color:"#fff",padding:"5px 10px",textAlign:"left",position:"sticky",left:0,minWidth:120}}>Formateur</th>
         <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",width:55}}>Cap/sem</th>
         <th style={{background:C.brun,color:"#fff",padding:"5px 8px",textAlign:"center",width:55}}>Total ann.</th>
         {allWeeks.map(function(wn){return(
          <th key={wn} style={{background:C.brun,color:"#fff",padding:"4px 6px",textAlign:"center",minWidth:36,fontSize:9}}>
           S{wn}
          </th>
         );})}
        </tr>
       </thead>
       <tbody>
        {state.teachers.map(function(t,ti){
         var cap=getTeacherWeekCap(state,t.id);
         var prevH=getTeacherPrevHours(state,t.id);
         var realH=getTeacherRealHours(state,t.id);
         // Heures annuelles depuis la matrice
         var annH=state.matrix.filter(function(m){return m.teacherId===t.id&&!m.isMGReceiver;})
          .reduce(function(s,m){return s+(m.hoursAnnual||0);},0);
         // Total prevu sur l'annee depuis PF
         var totalPrev=Object.values(prevH).reduce(function(s,h){return s+h;},0);
         return(
          <tr key={t.id} style={{background:ti%2===0?"#fff":C.creme}}>
           <PDay style={{padding:"5px 10px",fontWeight:600,color:C.txt,position:"sticky",left:0,
            background:ti%2===0?"#fff":C.creme,borderRight:"1px solid "+C.bord}}>
            {t.name}
           </PDay>
           <PDay style={{padding:"4px",textAlign:"center",borderRight:"1px solid "+C.bord,
            color:C.olive,fontWeight:700}}>{cap}h</PDay>
           <PDay style={{padding:"4px",textAlign:"center",borderRight:"1px solid "+C.bord,
            color:C.dim,fontSize:9}}>
            <div style={{fontWeight:600,color:C.brun}}>{annH}h</div>
            <div style={{color:C.mut}}>mat.</div>
           </PDay>
           {allWeeks.map(function(wn){
            var h=prevH[wn]||0;
            var hR=realH[wn]||0;
            var display=hR>0?hR:h; // reel si dispo, sinon prevu
            var isReal=hR>0;
            var capEx=Math.round((cap/20)*23*10)/10;
            var color=display>capEx?"#dc2626":display>cap?"#f59e0b":display>0?C.olive:C.bord;
            var bg=display>capEx?"#fee2e2":display>cap?"#fef3c7":display>0?"#f0fdf4":"transparent";
            // Verifier 2 semaines consecutives > cap
            var prevW1=allWeeks[allWeeks.indexOf(wn)-1];
            var prevW2=allWeeks[allWeeks.indexOf(wn)-2];
            var consec=(prevH[prevW1]||realH[prevW1]||0)>cap&&(prevH[prevW2]||realH[prevW2]||0)>cap;
            if(consec&&display>cap) bg="#fecaca"; // rouge clair si 3e semaine consecutive
            return(
             <PDay key={wn} style={{padding:"3px 2px",textAlign:"center",
              borderRight:"1px solid "+C.bord,background:bg,cursor:"default"}}>
              {display>0&&(
               <span style={{color,fontWeight:display>cap?700:400,fontSize:10}}>
                {display}h
                {isReal&&<span style={{fontSize:7,display:"block",color:C.mut}}>reel</span>}
               </span>
              )}
             </PDay>
            );
           })}
          </tr>
         );
        })}
       </tbody>
      </table>
     </div>
     <div style={{marginTop:8,fontSize:10,color:C.mut}}>
      Les heures reelles (reel) proviennent du planning genere. Les autres sont issues du plan de formation previsionnel.
     </div>
    </div>
   )}
 );
}

 }

function EtablissementPanel({state,setState}){
 const DAYS_NAMES=["Lundi","Mardi","Mercredi","Jeudi","Vendredi"];
 var _etabSlots=state.etab&&state.etab.slots;
 // Si pas de slots definis, utiliser DEFAULT_ETAB.slots
 if(!_etabSlots||!_etabSlots.length||!_etabSlots[0]||!_etabSlots[0].length){
  _etabSlots=(window.DEFAULT_ETAB&&window.DEFAULT_ETAB.slots)||[];
 }
 const slots=_etabSlots;
 const [selDay,setSelDay]=React.useState(0);
 const [epView,setEpView]=React.useState("horaires");

 function sortDay(arr){
  return arr.slice().sort(function(a,b){
   var as=a.start||"00:00",bs2=b.start||"00:00";
   return as<bs2?-1:as>bs2?1:0;
  });
 }
 function updSlot(di,si,field,val){
  setState(function(p){
   var etab=Object.assign({},p.etab||{});
   var _defSlots=(window.DEFAULT_ETAB&&window.DEFAULT_ETAB.slots)||[];
   var raw=etab.slots&&etab.slots.length?JSON.parse(JSON.stringify(etab.slots)):JSON.parse(JSON.stringify(_defSlots));
   if(!raw[di]) raw[di]=[];
   // si est l index dans le tableau TRIE (tel qu affiche)
   var sorted=sortDay(raw[di]);
   var target=sorted[si];
   if(!target){etab.slots=raw;return Object.assign({},p,{etab:etab});}
   // Trouver ce slot dans raw par _id (priorite) ou start+end
   var rawIdx=target._id?raw[di].findIndex(function(s){return s._id===target._id;}):
    raw[di].findIndex(function(s){return s.start===target.start&&s.end===target.end;});
   if(rawIdx<0) rawIdx=si;
   raw[di][rawIdx][field]=val;
   if(field==="start"||field==="end"){
    var s=raw[di][rawIdx];
    if(s.start&&s.end) s.label=s.start.replace(":","h")+"-"+s.end.replace(":","h");
   }
   raw[di]=sortDay(raw[di]);
   etab.slots=raw;
   return Object.assign({},p,{etab:etab});
  });
 }

 function addSlot(di){
  setState(function(p){
   var etab=Object.assign({},p.etab||{});
   var _ds2=(window.DEFAULT_ETAB&&window.DEFAULT_ETAB.slots)||[];
   var ss=etab.slots&&etab.slots.length?JSON.parse(JSON.stringify(etab.slots)):JSON.parse(JSON.stringify(_ds2));
   if(!ss[di]) ss[di]=[];
   var last=ss[di][ss[di].length-1];
   var newStart=last?last.end:"08:00";
   var newEnd="09:00";
   var newId="sl_"+Date.now()+"_"+di+"_"+Math.random().toString(36).slice(2,6);
   ss[di].push({_id:newId,label:newStart.replace(":","h")+"-"+newEnd.replace(":","h"),
    start:newStart,end:newEnd,period:"morning",isAccueil:false,isBilan:false});
   ss[di]=ss[di].slice().sort(function(a,b){var as=a.start||"00:00",bs2=b.start||"00:00";return as<bs2?-1:as>bs2?1:0;});
   etab.slots=ss;
   return Object.assign({},p,{etab:etab});
  });
 }

 function delSlot(di,si){
  setState(function(p){
   var etab=Object.assign({},p.etab||{});
   var _ds2=(window.DEFAULT_ETAB&&window.DEFAULT_ETAB.slots)||[];
   var ss=etab.slots&&etab.slots.length?JSON.parse(JSON.stringify(etab.slots)):JSON.parse(JSON.stringify(_ds2));
   if(ss[di]){
    // Trouver le slot dans le tableau brut via l'index trie
    var sortedDel=ss[di].slice().sort(function(a,b){var as=a.start||"00:00",bs2=b.start||"00:00";return as<bs2?-1:as>bs2?1:0;});
    var targetDel=sortedDel[si];
    if(targetDel){
     var rawDelIdx=ss[di].findIndex(function(s){return s.start===targetDel.start&&s.end===targetDel.end;});
     if(rawDelIdx>=0) ss[di].splice(rawDelIdx,1);
    }
   }
   etab.slots=ss;
   return Object.assign({},p,{etab:etab});
  });
 }

 function copyDayTo(fromDi,toDi){
  setState(function(p){
   var etab=Object.assign({},p.etab||{});
   var _ds2=(window.DEFAULT_ETAB&&window.DEFAULT_ETAB.slots)||[];
   var ss=etab.slots&&etab.slots.length?JSON.parse(JSON.stringify(etab.slots)):JSON.parse(JSON.stringify(_ds2));
   ss[toDi]=JSON.parse(JSON.stringify(ss[fromDi]||[]));
   // Retirer accueil et bilan du jour cible
   ss[toDi]=ss[toDi].map(function(sl){return Object.assign({},sl,{isAccueil:false,isBilan:false});});
   etab.slots=ss;
   return Object.assign({},p,{etab:etab});
  });
 }

 var daySlots=(slots[selDay]||[]).slice().sort(function(a,b){
  var as=a.start||"00:00",bs2=b.start||"00:00";
  return as<bs2?-1:as>bs2?1:0;
 });

   {epView==="horaires"&&(

    {daySlots.map(function(sl,si){return(

      <select value={sl.period||"morning"} onChange={function(e){updSlot(selDay,si,"period",e.target.value);}}

       <option value="afternoon">Apres-midi</option>

      <select value={sl.isAccueil?"accueil":sl.isBilan?"bilan":sl.isBreak?"pause":"normal"}

       <option value="normal">Normal</option>
       <option value="pause">Pause</option>
       <option value="accueil">Accueil</option>
       <option value="bilan">Bilan</option>
      </select>
      <span style={{fontSize:10,color:C.dim}}>{sl.label||sl.start+"-"+sl.end}</span>
      <button onClick={function(){delSlot(selDay,si);}}
       style={{border:"none",background:"none",color:C.red,cursor:"pointer",fontSize:14,padding:2}}>x</button>
     </div>
    );})}
   </div>

   <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
    <Btn sm onClick={function(){addSlot(selDay);}}>+ Ajouter un creneau</Btn>

   <div style={{background:C.surf,border:"1px solid "+C.bord,borderRadius:10,padding:14,marginTop:12}}>

     <div>
      <div style={{fontSize:10,color:C.mut,marginBottom:3}}>Debut pause</div>
